<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - Electric Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-image">
                    <img src="../../images/logo/electricity_logo2.png" alt="Logo" height="100px" width="100px">
                </div>
                Electric <span style="font-style: italic;">MS</span>
            </div>
            <button class="nav-toggle" id="navToggle">&#9776;</button>
            <ul id="navMenu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="rates.html">Rates</a></li>
                <li><a href="consumers.html">Consumers</a></li>
                <li><a href="billing.html">Billing</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="reports.html">Reports</a></li>
                <li><a href="../../backend/php/auth.php?action=logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Billing Management</h1>
        <button class="btn btn-success" id="addReadingBtn">Add New Reading</button>

        <div class="filter-bar">
            <input type="text" id="billSearch" placeholder="Search consumer / status / date...">
        
            <select id="statusFilter">
                <option value="">All Status</option>
                <option value="paid">Paid</option>
                <option value="unpaid">Unpaid</option>
            </select>

            <select id="kwhFilter">
                <option value="">All Usage</option>
                <option value="high">High Usage</option>
                <option value="medium">Medium Usage</option>
                <option value="low">Low Usage</option>
            </select>

            <select id="monthFilter">
                <option value="">All Months</option>
                <option value="01">January</option>
                <option value="02">February</option>
                <option value="03">March</option>
                <option value="04">April</option>
                <option value="05">May</option>
                <option value="06">June</option>
                <option value="07">July</option>
                <option value="08">August</option>
                <option value="09">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
            
            <input type="number" id="yearFilter" placeholder="Year (e.g. 2026)">
            
            <select id="sortDate">
                <option value="">Sort Date</option>
                <option value="latest">Latest First</option>
                <option value="oldest">Oldest First</option>
            </select>
        </div>

        <div id="readingFormContainer" style="display: none; margin-top: 20px;">
            <h2>Add New Reading</h2>

            <form id="readingForm">
                <input type="hidden" name="action" value="add_reading">
                <label for="consumer_id">Consumer</label>
                <select id="consumer_id" name="consumer_id" required>
                    <!-- Consumers will be loaded here via AJAX -->
                </select>
                <label for="prev_reading">Previous Reading</label>
                <input type="number" id="prev_reading" name="prev_reading" step="0.01" required>
                <label for="curr_reading">Current Reading</label>
                <input type="number" id="curr_reading" name="curr_reading" step="0.01" required>
                <label for="reading_date">Reading Date</label>
                <input type="date" id="reading_date" name="reading_date" required>
                <label for="due_date">Due Date</label>
                <input type="date" id="due_date" name="due_date" required>
                <button type="submit">Generate Bill</button>
                <button type="button" class="btn btn-danger" id="cancelBtn" style="width: 100%; margin-top: 10px;">Cancel</button>
            </form>
        </div>

        <div class="table-responsive">
            <table id="billsTable">
                <thead>
                    <tr>
                        <th>Consumer</th>
                        <th>Prev Reading</th>
                        <th>Curr Reading</th>
                        <th>Kilowatt Hour</th>
                        <th>Amount</th>
                        <th>Due Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Bills will be loaded here via AJAX -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Mobile Navigation Toggle
            $('#navToggle').on('click', function() {
                $('#navMenu').toggleClass('active');
            });
            
            // filter bills
            function filterBills() {

                const kwhFilter = $('#kwhFilter').val();
                const searchValue = $('#billSearch').val().toLowerCase();
                const statusValue = $('#statusFilter').val().toLowerCase();
                const monthValue = $('#monthFilter').val();
                const yearValue = $('#yearFilter').val();
                const sortValue = $('#sortDate').val();

                let rows = $('#billsTable tbody tr').get();

                rows.forEach(row => {

                    const text = $(row).text().toLowerCase();
                    const status = $(row).find('td:nth-child(7)').text().toLowerCase();
                    const date = $(row).find('td:nth-child(6)').text(); // due date

                    let d = new Date(date);
                    let month = ("0" + (d.getMonth() + 1)).slice(-2);
                    let year = d.getFullYear().toString();

                    let matchSearch = text.includes(searchValue);
                    let matchStatus = statusValue === "" || status === statusValue;
                    let matchMonth = monthValue === "" || month === monthValue;
                    let matchYear = yearValue === "" || year === yearValue;

                    $(row).toggle(matchSearch && matchStatus && matchMonth && matchYear);
                });

                // kWh filtering
                if (kwhFilter) {
                    rows.forEach(row => {
                        const kwhText = $(row).find('td:nth-child(4)').text();
                        const kwh = parseFloat(kwhText);

                        let show = false;
                        if (kwhFilter === "high") show = kwh >= 500;
                        else if (kwhFilter === "medium") show = kwh >= 200 && kwh < 500;
                        else if (kwhFilter === "low") show = kwh < 200;

                        $(row).toggle(show);
                    });
                }

                // sorting
                if (sortValue) {
                    let tbody = $('#billsTable tbody');

                    let sorted = rows.sort((a, b) => {

                        let dateA = new Date($(a).find('td:nth-child(6)').text());
                        let dateB = new Date($(b).find('td:nth-child(6)').text());

                        if (sortValue === "latest") return dateB - dateA;
                        if (sortValue === "oldest") return dateA - dateB;
                    });

                    tbody.append(sorted);
                }
            }
            

            // events
            $('#yearFilter').val(new Date().getFullYear());
            $('#monthFilter, #yearFilter').on('change', filterBills);
            $('#billSearch').on('keyup', filterBills);
            $('#kwhFilter').on('change', filterBills);
            $('#statusFilter').on('change', filterBills);

            // sort date handler
            $('#sortDate').on('change', function () {
                let sortValue = $(this).val();

                let data = $('#billsTable tbody tr').get();

                data.sort((a, b) => {

                    let dateA = new Date($(a).find('td:nth-child(6)').text());
                    let dateB = new Date($(b).find('td:nth-child(6)').text());

                    if (sortValue === "latest") return dateB - dateA;
                    if (sortValue === "oldest") return dateA - dateB;
                    return 0;
                });

                $('#billsTable tbody').append(data);
            });

            function loadBills() {
                $.ajax({
                    url: '../../backend/php/billing.php?action=get_all_bills',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {

                            let data = response.data;

                            // default sort = latest added
                            data.sort((a, b) => {
                                let dateA = new Date(a.created_at || a.reading_date || a.due_date);
                                let dateB = new Date(b.created_at || b.reading_date || b.due_date);
                                return dateB - dateA;
                            });

                            renderBills(data);
                        } else {
                            alert('Error: ' + response.message);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('AJAX Error: ' + status + ' - ' + error);
                        $('#billsTable tbody').html(
                            '<tr><td colspan="8" style="text-align:center; color:red;">Failed to load data.</td></tr>'
                        );
                    }
                });
            }

            function renderBills(data) {

            let rows = '';

            if (data.length === 0) {
                rows = '<tr><td colspan="8" style="text-align:center;">No bills found.</td></tr>';
            } else {

                data.forEach(bill => {

                    let kwh = parseFloat(bill.curr_reading) - parseFloat(bill.prev_reading);
                    if (isNaN(kwh)) kwh = 0;

                    let kwhClass = '';
                    if (kwh >= 500) kwhClass = 'style="color:red;font-weight:bold;"';
                    else if (kwh >= 200) kwhClass = 'style="color:orange;"';

                    rows += `
                        <tr>
                            <td>${bill.consumer_name}</td>
                            <td>${bill.prev_reading}</td>
                            <td>${bill.curr_reading}</td>
                            <td ${kwhClass}>${kwh.toFixed(2)} kWh</td>
                            <td>₱${parseFloat(bill.amount).toFixed(2)}</td>
                            <td>${bill.due_date}</td>
                            <td>${bill.status}</td>
                            <td>
                                <button 
                                    class="btn btn-primary viewBillBtn"
                                    data-id="${bill.id}"
                                    ${bill.status.toLowerCase() !== 'paid' ? 'disabled' : ''}>
                                    View Receipt
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }

            $('#billsTable tbody').html(rows);
            }

            loadBills();

            // Load consumers for the dropdown
            function loadConsumersForDropdown() {
                $.ajax({
                    url: '../../backend/php/consumers.php?action=get_all',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            let options = '<option value="">Select Consumer</option>';
                            response.data.forEach(consumer => {
                                options += `<option value="${consumer.id}">${consumer.name} (${consumer.meter_no})</option>`;
                            });
                            $('#consumer_id').html(options);
                        }
                    }
                });
            }

            // Show add reading form
            $('#addReadingBtn').on('click', function() {
                loadConsumersForDropdown();
                $('#readingForm')[0].reset();
                $('#readingFormContainer').show();
                $('html, body').animate({ scrollTop: $("#readingFormContainer").offset().top }, 500);
            });

            // Cancel form
            $('#cancelBtn').on('click', function() {
                $('#readingFormContainer').hide();
            });

            // View bill details (Open Receipt)
            $(document).on('click', '.viewBillBtn', function() {
                const id = $(this).data('id');
                window.open(`receipt.html?id=${id}`, '_blank');
            });

            // Submit reading form
            $('#readingForm').on('submit', function(e) {
                e.preventDefault();

                // prevent negative readings
                let prev = parseFloat($('#prev_reading').val());
                let curr = parseFloat($('#curr_reading').val());

                if (curr < prev) {
                    alert("Current reading cannot be lower than previous reading.");
                    return;
                }

                $.ajax({
                    url: '../../backend/php/billing.php',
                    type: 'POST',
                    data: $(this).serialize(),
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            alert(response.message);
                            $('#readingFormContainer').hide();
                            loadBills();
                        } else {
                            alert(response.message);
                        }
                    }
                });
            });

            $('#curr_reading').on('input', function() {
                let prev = parseFloat($('#prev_reading').val());
                let curr = parseFloat($(this).val());

                if (curr < prev) {
                    $(this).css('border', '2px solid red');
                } else {
                    $(this).css('border', '');
                }
            });

        });
    </script>
</body>
</html>
