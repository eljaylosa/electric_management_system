<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - Electric Management System</title>
    <link rel="icon" type="image/png" href="../../images/logo/electricity_logo2.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/theme.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../js/notification.js" defer></script>
    <script src="../js/theme.js"></script>
</head>
<style>
    #readingFormContainer {
    display: none;
    margin-top: 20px;
    padding: 20px;
    background: var(--card-bg);
    color: var(--text-main);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    box-shadow: var(--shadow);
}
</style>
<body>
    <!-- NAVIGATION (same as before) -->
    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-image">
                    <img src="../../images/logo/electricity_logo2.png" alt="Logo" height="100px" width="100px">
                </div>
                Electric <span style="font-style: italic;">MS</span>
            </div>
            <button class="nav-toggle" id="navToggle">&#9776;</button>
            <ul id="navMenu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="rates.html">Rates</a></li>
                <li><a href="consumers.html">Consumers</a></li>
                <li><a href="billing.html">Billing</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="reports.html">Reports</a></li>
                <li class="separator">|</li>
                <li><a href="admin_signup_requests.html" class="request-btn">Check Requests</a></li>
                <li>|</li>
                <li><a href="../../backend/php/auth.php?action=logout" class="logout-btn">Logout</a></li>
                <li style="position:relative;">
                    <a href="#" id="notifBell">🔔 
                        <span id="notifCount" style="
                            background:red;
                            color:white;
                            border-radius:50%;
                            padding:2px 6px;
                            font-size:12px;
                            "></span>
                    </a>
                    <div id="notifDropdown" style="
                        display:none;
                        position:absolute;
                        right:0;
                        background:white;
                        width:300px;
                        box-shadow:0 0 10px rgba(0,0,0,0.2);
                        max-height:300px;
                        overflow:auto;
                    "></div>
                </li>
                <li>
                    <button id="themeToggle">🌙</button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Billing Management</h1>
        <button class="btn btn-success" id="addReadingBtn">➕ Add New Reading</button>

        <!-- 🔥 FIXED Filter bar with Clear button -->
        <div class="filter-bar" style="margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap; align-items: end;">
            <input type="text" id="billSearch" placeholder="🔍 Search consumers..." style="flex:1; padding:10px;">
            <select id="statusFilter" style="padding:10px;">
                <option value="">All Status</option>
                <option value="paid">✅ Paid</option>
                <option value="unpaid">⏳ Unpaid</option>
                <option value="due">⚠️ Due</option>
            </select>
            <select id="kwhFilter">
                <option value="">All Usage</option>
                <option value="high">High Usage</option>
                <option value="medium">Medium Usage</option>
                <option value="low">Low Usage</option>
            </select>
            <select id="monthFilter" style="padding:10px;">
                <option value="">All Months</option>
                <!-- Dynamic months populated here -->
            </select>
            <input type="number" id="yearFilter" placeholder="Year" min="2020" max="2030" style="padding:10px; width:100px;">
            <button class="btn btn-secondary" id="clearFilters" style="padding:10px 15px; white-space:nowrap;">🔄 Clear</button>
        </div>

        <!-- Add form (same) -->
        <div id="readingFormContainer">
            <h2 id="formTitle">➕ Add New Reading</h2>
            <form id="readingForm">
                <input type="hidden" name="action" value="add_reading">
                <label>Consumer *</label>
                <select id="consumer_id" name="consumer_id" required style="width:100%; padding:10px; margin-bottom:15px;"></select>
                <div style="display:flex; gap:15px;">
                    <div style="flex:1;"><label>Previous *</label><input type="number" id="prev_reading" name="prev_reading" step="0.01" min="0" required style="width:100%; padding:10px;"></div>
                    <div style="flex:1;"><label>Current *</label><input type="number" id="curr_reading" name="curr_reading" step="0.01" min="0" required style="width:100%; padding:10px;"></div>
                </div>
                <div style="display:flex; gap:15px; margin:15px 0;">
                    <div style="flex:1;"><label>Reading Date *</label><input type="date" id="reading_date" name="reading_date" required style="width:100%; padding:10px;"></div>
                    <div style="flex:1;"><label>Due Date *</label><input type="date" id="due_date" name="due_date" required style="width:100%; padding:10px;"></div>
                </div>
                <button type="submit" class="btn btn-success" style="width:48%; padding:12px;">💰 Generate Bill</button>
                <button type="button" class="btn btn-danger" id="cancelBtn" style="width:48%; padding:12px;">❌ Cancel</button>
            </form>
        </div>

        <div class="table-responsive">
            <table id="billsTable">
                <thead>
                    <tr>
                        <th>Consumer</th>
                        <th>Prev</th>
                        <th>Curr</th>
                        <th>kWh</th>
                        <th>Amount</th>
                        <th>Due</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
$(document).ready(function() {
    $('#navToggle').click(() => $('#navMenu').toggleClass('active'));
    $('#yearFilter').val(new Date().getFullYear());

    // 🔥 Store all bills for filtering
    let allBillsData = [];

    // 🔥 kWh Color coding function
    function getKwhColor(kwh) {
        const numKwh = parseFloat(kwh) || 0;
        if (numKwh >= 500) return '#e74c3c';  // RED - High
        if (numKwh >= 200) return '#f39c12';  // ORANGE - Medium  
        if (numKwh >= 50) return '#f1c40f';   // YELLOW - Normal
        return '#27ae60';                     // GREEN - Low
    }

    function isDue(bill) {
        if (!bill.due_date) return false;

        const today = new Date();
        const due = new Date(bill.due_date);

        return (bill.status === 'unpaid') && (due < today);
    }

    // 🔥 FIXED loadBills with data storage
    function loadBills() {
        $.ajax({
            url: '../../backend/php/billing.php?action=get_all_bills',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                console.log('RAW RESPONSE:', response);

                let data = response.data;

                // FORCE PARSE if needed
                if (typeof data === "string") {
                    try {
                        data = JSON.parse(data);
                    } catch (e) {
                        data = [];
                    }
                }

                if (!Array.isArray(data)) {
                    data = [];
                }

                allBillsData = data;

                console.log("CLEAN DATA:", allBillsData);

                populateMonthFilter();
                applyFilters();
                
            },
            error: function(xhr, status, error) {
                console.error('Load error:', error);
                $('#billsTable tbody').html('<tr><td colspan="8" style="color:red; text-align:center; padding:20px;">Failed to load bills</td></tr>');
            }
        });
    }

    // 🔥 Populate months from data
    function populateMonthFilter() {

    const months = [
        { value: '01', name: 'January' },
        { value: '02', name: 'February' },
        { value: '03', name: 'March' },
        { value: '04', name: 'April' },
        { value: '05', name: 'May' },
        { value: '06', name: 'June' },
        { value: '07', name: 'July' },
        { value: '08', name: 'August' },
        { value: '09', name: 'September' },
        { value: '10', name: 'October' },
        { value: '11', name: 'November' },
        { value: '12', name: 'December' }
    ];

    let options = '<option value="">All Months</option>';

    months.forEach(m => {
        options += `<option value="${m.value}">${m.name}</option>`;
    });

    $('#monthFilter').html(options);
    }

    // 🔥 FIXED renderBills with data attributes
    function renderBills(data) {
        if (!data?.length) {
            $('#billsTable tbody').html('<tr><td colspan="8" style="text-align:center; padding:20px;">No bills match filters</td></tr>');
            return;
        }

        let html = '';
        data.forEach(bill => {
            const kwh = (parseFloat(bill.curr_reading || 0) - parseFloat(bill.prev_reading || 0)).toFixed(2);
            let status = (bill.status || 'unpaid').toLowerCase();
            const kwhColor = getKwhColor(kwh);

            // 🔥 override if overdue
            if (isDue(bill)) {
                status = 'due';
            }

            // ✅ PROPER COLOR SYSTEM
            let statusColor = '#e74c3c'; // unpaid default

            if (status === 'paid') {
                statusColor = '#27ae60';
            } else if (status === 'due') {
                statusColor = '#c0392b'; // darker red for due
            }

            const isPaid = status === 'paid';

            const readingDate = bill.reading_date 
                ? new Date(bill.reading_date + "T00:00:00") 
                : new Date();

            const month = (readingDate.getMonth() + 1).toString().padStart(2, '0');
            const year = readingDate.getFullYear();

            html += `
                <tr data-consumer="${(bill.consumer_name || '').toLowerCase()}"
                    data-status="${status}"
                    data-month="${month}"
                    data-year="${year}"
                    data-kwh="${kwh}">
                    <td>${bill.consumer_name || 'N/A'}</td>
                    <td>${bill.prev_reading || 0}</td>
                    <td>${bill.curr_reading || 0}</td>
                    <td style="color:${kwhColor}; font-weight:bold;">${kwh} kWh</td>
                    <td>₱${parseFloat(bill.amount || 0).toFixed(2)}</td>
                    <td>${bill.due_date || ''}</td>
                    <td style="color:${statusColor}; font-weight: bold;">
                        ${status.toUpperCase()}
                    </td>
                    <td>
                        ${isPaid ? `
                            <button class="btn btn-primary viewBillBtn" data-id="${bill.id}">
                                📄 Receipt
                            </button>
                        ` : `
                            <button class="btn btn-warning" disabled style="opacity:0.6;">
                                ⏳ Pay First
                            </button>
                        `}
                    </td>
                </tr>
            `;
        });

        $('#billsTable tbody').html(html);
    }


    // 🔥 FIXED Filtering system
    function applyFilters() {
        const search = ($('#billSearch').val() || '').toLowerCase();
        const statusFilter = ($('#statusFilter').val() || '').toLowerCase();
        const monthFilter = $('#monthFilter').val();
        const yearFilter = $('#yearFilter').val();

        let filteredData = allBillsData.filter(bill => {

            const consumerName = (bill.consumer_name || '').toLowerCase();

            // 🔥 FIX: compute real status (with due)
            let status = (bill.status || 'unpaid').toLowerCase();

            if (isDue(bill)) {
                status = 'due';
            }

            const consumerMatch = consumerName.includes(search);

            const statusMatch =
                !statusFilter ||
                status === statusFilter;

            // DATE FILTER
            let monthMatch = true;
            let yearMatch = true;

            if (bill.due_date) {
                const date = new Date(bill.due_date);

                if (!isNaN(date.getTime())) {
                    const billMonth = String(date.getMonth() + 1).padStart(2, '0');
                    const billYear = String(date.getFullYear());

                    if (monthFilter) monthMatch = billMonth === monthFilter;
                    if (yearFilter) yearMatch = billYear === String(yearFilter);
                }
            }

            // KWH FILTER
            const prev = parseFloat(bill.prev_reading);
            const curr = parseFloat(bill.curr_reading);

            let kwh = 0;


            if (!isNaN(prev) && !isNaN(curr)) {
                kwh = parseFloat((curr - prev).toFixed(2));
            }
            const kwhFilterValue = $('#kwhFilter').val();

            let kwhMatch = true;

            if (kwhFilterValue === 'high') {
                kwhMatch = kwh >= 500;
            } else if (kwhFilterValue === 'medium') {
                kwhMatch = kwh >= 200 && kwh < 500;
            } else if (kwhFilterValue === 'low') {
                kwhMatch = kwh < 200;
            }

            return consumerMatch && statusMatch && monthMatch && yearMatch && kwhMatch;
        });

        renderBills(filteredData);
    }

    // 🔥 FIXED Filter events
    $('#billSearch').on('input', applyFilters);
    $('#statusFilter').on('change', applyFilters);
    $('#monthFilter').on('change', applyFilters);
    $('#yearFilter').on('input', applyFilters);
    $('#kwhFilter').on('change', applyFilters);

    // 🔥 Clear filters
    $('#clearFilters').click(function() {
        $('#billSearch').val('');
        $('#statusFilter').val('');
        $('#monthFilter').val('');
        $('#yearFilter').val(new Date().getFullYear());
        applyFilters();
    });

    // EXACT SAME RECEIPT HANDLER AS CUSTOMER DASHBOARD
    $(document).on('click', '.viewBillBtn', function(e) {
        e.preventDefault();
        const billId = $(this).data('id');
        console.log('Receipt clicked:', billId);
        if (!billId) {
            alert('❌ Invalid bill ID');
            return;
        }
        window.open(`receipt.html?id=${billId}`, '_blank', 'width=800,height=1000');
    });

    // Add form (unchanged)
    $('#addReadingBtn').click(() => {
        $.get('../../backend/php/consumers.php?action=get_all').done(res => {
            if (res.status === 'success') {
                let options = '<option value="">Select...</option>';
                res.data.forEach(c => options += `<option value="${c.id}">${c.name} (${c.meter_no})</option>`);
                $('#consumer_id').html(options);
            }
        });
        $('#readingForm')[0].reset();
        $('#reading_date').val(new Date().toISOString().split('T')[0]);
        $('#due_date').val(new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0]);
        $('#readingFormContainer').show();
    });

    
    $('#readingForm').submit(e => {
        e.preventDefault();
        $.post('../../backend/php/billing.php', $('#readingForm').serialize())
        .done(res => {
            if (res.status === 'success') {
                alert('✅ ' + res.message);
                $('#readingFormContainer').hide();
                loadBills();
            } else alert('❌ ' + res.message);
        }).fail(() => alert('❌ Network error'));
    });

    $('#cancelBtn').click(() => $('#readingFormContainer').hide());

    // Initial load
    loadBills();
    if (typeof initNotifications === 'function') initNotifications();
});
</script>


</body>
</html>
