<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Electric Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 50px;">
        <h1 style="text-align: center;">Customer Sign Up</h1>
        <form id="signupForm">
            <input type="hidden" name="action" value="signup">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <label for="meter_no">Meter Number</label>
            <input type="text" id="meter_no" name="meter_no" placeholder="Enter your registered meter number" required>
            <button type="submit">Sign Up</button>
        </form>
        <div id="signupMessage" style="text-align: center; margin-top: 10px;"></div>
        <p style="text-align: center; margin-top: 20px;">Already have an account? <a href="index.html">Login here</a></p>
    </div>

    <script>
        $(document).ready(function() {
            $('#signupForm').on('submit', function(e) {
                e.preventDefault();
                $.ajax({
                    url: '../../backend/php/auth.php',
                    type: 'POST',
                    data: $(this).serialize(),
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            $('#signupMessage').css('color', '#2ecc71').text(response.message);
                            setTimeout(function() {
                                window.location.href = 'index.html';
                            }, 2000);
                        } else {
                            $('#signupMessage').css('color', '#e74c3c').text(response.message);
                        }
                    },
                    error: function() {
                        $('#signupMessage').css('color', '#e74c3c').text('An error occurred. Please try again.');
                    }
                });
            });
        });
    </script>
</body>
</html>
