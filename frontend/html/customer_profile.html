<style>
     /* Container ng button para sa proper spacing */
.support-button {
    background: linear-gradient(45deg, #007dfe, #00c6ff); /* GCash Blue Gradient */
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 50px; /* Rounded shape */
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease; /* Para sa smooth animation */
    box-shadow: 0 4px 15px rgba(0, 125, 254, 0.3);
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Hover Effect: Lalaki ng konti at mas mag-glow */
.support-button:hover {
    transform: translateY(-3px); /* Tatalon ng konti pataas */
    box-shadow: 0 8px 25px rgba(0, 125, 254, 0.5);
    background: linear-gradient(45deg, #00c6ff, #007dfe); /* Reverse gradient */
}

/* Active Effect: Kapag pinindot */
.support-button:active {
    transform: translateY(1px);
}

/* Ang "Shine" Animation: May dadaan na liwanag sa button */
.support-button::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 20%;
    height: 200%;
    background: rgba(255, 255, 255, 0.3);
    transform: rotate(30deg);
    transition: all 0.5s;
}

.support-button:hover::after {
    left: 120%; /* Lilipad yung liwanag sa kabilang side */
}

/* PROFILE WRAPPER */
.profile-wrapper{
    display:flex;
    justify-content:center;
    margin-top:40px;
}

/* CARD */
.profile-card{
    width:700px;
    background: var(--card);
    color: var(--text);
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* HEADER */
.profile-header{
    text-align:center;
    margin-bottom:25px;
}

.profile-img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #4f46e5;
}

.profile-header h2{
    margin-top:10px;
}

/* FORM */
.form-row{
    display:flex;
    gap:15px;
}

.form-group{
    margin-bottom:15px;
    flex:1;
}

label{
    font-weight:600;
    font-size:14px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4f46e5;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.btn:hover{
    background:#3730a3;
}

/* SECTIONS */
.section{
    margin-top:25px;
    padding-top:15px;
    border-top: 1px solid var(--border);
}

.section h3{
    margin-bottom:10px;
}

/* SUMMARY BOX */
.summary-box{
    display:flex;
    justify-content:space-between;
    background: var(--card);
    padding:15px;
    border-radius:10px;
    border: 1px solid var(--border);
}

.summary-box div{
    text-align:center;
}

.summary-box h4{
    margin:0;
    color: var(--text);
}
.summary-box small {
    color: var(--muted);
}

.password-wrapper {
    position: relative;
    margin-bottom: 10px;
}

.password-wrapper input {
    width: 100%;
    padding: 10px;
}

.togglePass {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    user-select: none;
}

.contact-admin-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    background: linear-gradient(45deg, #007dfe, #00c6ff);
    color: white;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0, 125, 254, 0.4);
    z-index: 999;
    transition: all 0.3s ease;
}

/* Hover effect */
.contact-admin-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 30px rgba(0, 125, 254, 0.6);
}

/* Click effect */
.contact-admin-btn:active {
    transform: scale(0.95);
}
</style>

<body>

<!-- PROFILE -->
<div class="profile-wrapper">
<div class="profile-card">

    <!-- HEADER -->
    <div class="profile-header">
        <p style="color:gray;">Consumer Account</p>
        <img src="../../images/default.png" id="profileImg" class="profile-img">
        <input type="file" id="uploadInput">
        <button class="btn" id="uploadBtn">Upload Photo</button>
        <p>Consumer Name</p>
        <h2 id="displayName"></h2>
       
    </div>

    <!-- PROFILE FORM -->
    <form id="profileForm">

        <div class="form-row">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name">
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" id="address">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
        </div>

        <div class="form-group">
            <label>Meter Number</label>
            <input type="text" id="meter" disabled>
        </div>

        <button type="submit" class="btn">Save Changes</button>
    </form>

    <!-- USERNAME -->
     <div class="section">
        <input type="text" id="username" placeholder="Update Username">
        <p id="currentUsername"></p>
        <p>Note: username is your log in credential</p>
        <button class="btn" id="changeUsernameBtn">Update Username</button>
     </div>

    <!-- PASSWORD -->
    <div class="section">
        <h3>Change Password</h3>
    
        <div class="password-wrapper">
            <input type="password" id="oldPass" placeholder="Old Password">
            <span class="togglePass" data-target="oldPass">👁️</span>
        </div>
    
        <div class="password-wrapper">
            <input type="password" id="newPass" placeholder="New Password">
            <span class="togglePass" data-target="newPass">👁️</span>
        </div>
    
        <button class="btn" id="changePassBtn">Update Password</button>
    </div>

    <!-- SUMMARY -->
    <div class="section">
        <h3>Billing Summary</h3>

        <div class="summary-box">
            <div>
                <h4 id="totalBills">0</h4>
                <small>Total Bills</small>
            </div>

            <div>
                <h4 id="paidAmount">₱0</h4>
                <small>Paid</small>
            </div>

            <div>
                <h4 id="unpaidAmount">₱0</h4>
                <small>Unpaid</small>
            </div>
        </div>
    </div>

</div>
</div>

<script>
    $(document).ready(function(){

        //toggle eye pass
        $('.togglePass').click(function () {
            const targetId = $(this).data('target');
            const input = $('#' + targetId);

            if (input.attr('type') === 'password') {
                input.attr('type', 'text');
                $(this).text('🙈'); // change icon
            } else {
                input.attr('type', 'password');
                $(this).text('👁️');
            }
        });

    /* ================= LOAD PROFILE ================= */
    function loadProfile(){
        $.ajax({
            url: '../../backend/php/profile.php?action=get_profile',
            type: 'GET',
            dataType: 'json',
            success: function(res){

                if(res.status === "success"){
                    let u = res.data;

                    $('#name').val(u.name || '');
                    $('#address').val(u.address || '');
                    $('#email').val(u.email || '');
                    $('#meter').val(u.meter_no || '');

                    $('#displayName').text(u.name || '');

                    if(u.profile_pic){
                        $('#profileImg').attr('src', '../../uploads/' + u.profile_pic);
                    }
                } else {
                    alert(res.message);
                }
            },
            error: function(xhr){
                console.log(xhr.responseText);
                alert("Failed to load profile");
            }
        });
    }

    /* ================= UPDATE PROFILE ================= */
    $('#profileForm').submit(function(e){
        e.preventDefault();

        $.post('../../backend/php/profile.php', {
            action: 'update_profile',
            name: $('#name').val(),
            address: $('#address').val(),
            email: $("#email").val(),
            username: $('#username').val() || ''
        }, function(res){

            if(res.status === "success"){
                alert(res.message);
                loadProfile();
            } else {
                alert(res.message);
            }

        }, 'json');
    });

    // get current username
    function loadUsername(){
        $.get('../../backend/php/profile.php?action=get_username', function(res){
            if(res.status === "success"){
                $('#currentUsername').text("Current Username: " + res.data.username);
            }
        }, 'json');
    }

    // update username
    $('#changeUsernameBtn').click(function(){

        let newUsername = $('#username').val().trim();

        if(!newUsername){
            alert("Enter new username");
            return;
        }

        $.post('../../backend/php/profile.php', {
            action: 'update_username',
            username: newUsername
        }, function(res){

            if(res.status === "success"){
                alert(res.message);
                $('#username').val('');
                loadUsername();
            } else {
                alert(res.message);
            }

        }, 'json');
    });
  
    // change password
    // Change Password
    $('#changePassBtn').click(function () {

        let oldPass = $('#oldPass').val().trim();
        let newPass = $('#newPass').val().trim();

        // EMPTY CHECK
        if (!oldPass || !newPass) {
            alert("Fill both fields");
            return;
        }

        // 🔥 PASSWORD LENGTH CHECK (4–8 chars)
        if (newPass.length < 4 || newPass.length > 8) {
            alert("New password must be 4 to 8 characters only");
            return;
        }

        $.post('../../backend/php/profile.php', {
            action: 'change_password',
            old: oldPass,
            new: newPass
        }, function (res) {

            if (res.status === "success") {
                alert(res.message);
                $('#oldPass, #newPass').val('');
            } else {
                alert(res.message);
            }

        }, 'json');
    });

    

    /* ================= UPLOAD PIC ================= */
    $('#uploadBtn').click(function(){

        let file = $('#uploadInput')[0].files[0];

        if(!file){
            alert("Select file first");
            return;
        }

        let fd = new FormData();
        fd.append('image', file);
        fd.append('action', 'upload_pic');

        $.ajax({
            url:'../../backend/php/profile.php',
            type:'POST',
            data:fd,
            processData:false,
            contentType:false,
            dataType:'json',
            success:function(res){

                alert(res.message);

                if(res.status === "success"){
                    loadProfile();
                }
            }
        });
    });

    /* ================= SUMMARY ================= */
    function loadSummary(){
        $.get('../../backend/php/profile.php?action=summary', function(res){

            if(res.status === "success"){
                $('#totalBills').text(res.data.total_bills || 0);
                $('#paidAmount').text("₱" + (parseFloat(res.data.paid || 0)).toFixed(2));
                $('#unpaidAmount').text("₱" + (parseFloat(res.data.unpaid || 0)).toFixed(2));
            }

        }, 'json');
    }

    $('#contactAdminBtn').click(function () {
                // OPTION 1: redirect to support page
                window.location.href = 'contact_admin.html';

                // OPTION 2 (simple): show alert
                // alert("Contacting admin soon...");

                // OPTION 3 (better): open email
                // window.location.href = "mailto:admin@gmail.com?subject=Support Request";
            });

    /* INIT */
    loadUsername();
    initNotifications();
    loadProfile();
    loadSummary();

    });
</script>

<!-- 🎧 Contact Admin Floating Button -->
<div class="contact-admin-btn">
    <i class="fas fa-headset"></i>
</div>
</body>
