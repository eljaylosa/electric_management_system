<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - Electric Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <img src="../../images/logo/electricity_logo.png" alt="" height="100px" width="100px">
                <p>Electric MS</p>
            </div>
            <button class="nav-toggle" id="navToggle">&#9776;</button>
            <ul id="navMenu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="consumers.html">Consumers</a></li>
                <li><a href="billing.html">Billing</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="../../backend/php/auth.php?action=logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Payment Collection</h1>
        <button class="btn btn-success" id="recordPaymentBtn">Record New Payment</button>

        <div class="search-container">
            <label for="searchInput" style="display: block;">Search Payments:</label>
            <input type="text" name="" id="searchInput">
        </div>

        <div id="paymentFormContainer" style="display: none; margin-top: 20px;">
            <h2>Record New Payment</h2>
            <form id="paymentForm">
                <input type="hidden" name="action" value="record_payment">
                <label for="bill_id">Unpaid Bill</label>
                <select id="bill_id" name="bill_id" required>
                    <!-- Unpaid bills will be loaded here via AJAX -->
                </select>
                <label for="amount_paid">Amount Paid</label>
                <input type="number" id="amount_paid" name="amount_paid" step="0.01" required readonly>
                <label for="payment_date">Payment Date</label>
                <input type="date" id="payment_date" name="payment_date" required>
                <button type="submit">Record Payment</button>
                <button type="button" class="btn btn-danger" id="cancelBtn" style="width: 100%; margin-top: 10px;">Cancel</button>
            </form>
        </div>

        <div class="table-responsive">
            <table id="paymentsTable">
                <thead>
                    <tr>
                        <th>Consumer</th>
                        <th>Bill Amount</th>
                        <th>Amount Paid</th>
                        <th>Payment Date</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Payments will be loaded here via AJAX -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Mobile Navigation Toggle
            $('#navToggle').on('click', function() {
                $('#navMenu').toggleClass('active');
            });

            // Search functionality
            $('#searchInput').on('input', function() {
                const query = $(this).val().toLowerCase();
                $('#paymentsTable tbody tr').filter(function() {
                    $(this).toggle($(this).text().toLowerCase().indexOf(query) > -1);
                });
            });

            // Load all payments
            function loadPayments() {
                $.ajax({
                    url: '../../backend/php/billing.php?action=get_all_bills',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            let rows = '';
                            let paidBills = response.data.filter(bill => bill.status === 'paid');
                            if (paidBills.length === 0) {
                                rows = '<tr><td colspan="4" style="text-align:center;">No payments found.</td></tr>';
                            } else {
                                paidBills.forEach(bill => {
                                    rows += `
                                        <tr>
                                            <td data-label="Consumer">${bill.consumer_name}</td>
                                            <td data-label="Bill Amount">₱${parseFloat(bill.amount).toFixed(2)}</td>
                                            <td data-label="Amount Paid">₱${parseFloat(bill.amount).toFixed(2)}</td>
                                            <td data-label="Payment Date">${bill.due_date}</td>
                                        </tr>
                                    `;
                                });
                            }
                            $('#paymentsTable tbody').html(rows);
                        } else {
                            alert('Error: ' + response.message);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('AJAX Error: ' + status + ' - ' + error);
                        $('#paymentsTable tbody').html('<tr><td colspan="4" style="text-align:center; color:red;">Failed to load data. Check console for details.</td></tr>');
                    }
                });
            }

            loadPayments();

            // Load unpaid bills for the dropdown
            function loadUnpaidBills() {
                $.ajax({
                    url: '../../backend/php/billing.php?action=get_all_bills',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            let options = '<option value="">Select Unpaid Bill</option>';
                            response.data.forEach(bill => {
                                if (bill.status === 'unpaid') {
                                    options += `<option value="${bill.id}" data-amount="${bill.amount}">${bill.consumer_name} - ₱${parseFloat(bill.amount).toFixed(2)}</option>`;
                                }
                            });
                            $('#bill_id').html(options);
                        }
                    }
                });
            }

            // Show record payment form
            $('#recordPaymentBtn').on('click', function() {
                loadUnpaidBills();
                $('#paymentForm')[0].reset();
                $('#paymentFormContainer').show();
                $('html, body').animate({ scrollTop: $("#paymentFormContainer").offset().top }, 500);
            });

            // Update amount paid when bill is selected
            $('#bill_id').on('change', function() {
                const amount = $(this).find(':selected').data('amount');
                $('#amount_paid').val(amount);
            });

            // Cancel form
            $('#cancelBtn').on('click', function() {
                $('#paymentFormContainer').hide();
            });

            // Submit payment form
            $('#paymentForm').on('submit', function(e) {
                e.preventDefault();
                $.ajax({
                    url: '../../backend/php/billing.php',
                    type: 'POST',
                    data: $(this).serialize(),
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            alert(response.message);
                            $('#paymentFormContainer').hide();
                            loadPayments();
                        } else {
                            alert(response.message);
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
