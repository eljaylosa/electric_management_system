<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - Electric Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">Electric MS</div>
            <button class="nav-toggle" id="navToggle">&#9776;</button>
            <ul id="navMenu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="consumers.html">Consumers</a></li>
                <li><a href="billing.html">Billing</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="reports.html">Reports</a></li>
                <li><a href="../../backend/php/auth.php?action=logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Payment Collection</h1>

        <button class="btn btn-success" id="recordPaymentBtn">
            Record New Payment
        </button>

        <div class="filter-bar">
            <input type="text" id="paymentSearch" placeholder="Search consumer...">
        
            <select id="paymentStatusFilter">
                <option value="">All Status</option>
                <option value="paid">Paid</option>
            </select>
        </div>

        <!-- FORM -->
        <div id="paymentFormContainer" style="display:none; margin-top:20px;">
            <h2>Record New Payment</h2>

            <form id="paymentForm">
                <input type="hidden" name="action" value="record_payment">

                <label>Unpaid Bill</label>
                <select id="bill_id" name="bill_id" required></select>

                <label>Amount Paid</label>
                <input type="number" id="amount_paid" name="amount_paid" step="0.01" readonly required>

                <label>Payment Date</label>
                <input type="date" id="payment_date" name="payment_date" required>

                <button type="submit">Record Payment</button>

                <button type="button" class="btn btn-danger" id="cancelBtn"
                        style="width:100%; margin-top:10px;">
                    Cancel
                </button>
            </form>
        </div>

        <!-- TABLE -->
        <div class="table-responsive">
            <table id="paymentsTable">
                <thead>
                    <tr>
                        <th>Consumer</th>
                        <th>Bill Amount</th>
                        <th>Amount Paid</th>
                        <th>Payment Date</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function () {

            // NAV
            $('#navToggle').on('click', function () {
                $('#navMenu').toggleClass('active');
            });

            // SEARCH & FILTER
            function filterPayments() {
                const search = $('#paymentSearch').val().toLowerCase();
                const status = $('#paymentStatusFilter').val().toLowerCase();

                $('#paymentsTable tbody tr').filter(function () {

                    const rowText = $(this).text().toLowerCase();

                    // since all rows are "paid" in your current system
                    const matchesSearch = rowText.includes(search);
                    const matchesStatus = status === "" || rowText.includes(status);

                    $(this).toggle(matchesSearch && matchesStatus);
                });
            }

// events
$('#paymentSearch').on('keyup', filterPayments);
$('#paymentStatusFilter').on('change', filterPayments);

            /* =========================
               LOAD PAYMENTS (REAL DATA)
            ========================== */
            function loadPayments() {
                $.ajax({
                    url: '../../backend/php/billing.php?action=get_all_payments',
                    type: 'GET',
                    dataType: 'json',
                    success: function (response) {

                        let rows = '';

                        if (response.status === 'success') {

                            if (response.data.length === 0) {
                                rows = `<tr><td colspan="4" style="text-align:center;">No payments found.</td></tr>`;
                            } else {

                                response.data.forEach(p => {
                                    rows += `
                                        <tr>
                                            <td>${p.consumer_name}</td>
                                            <td>₱${parseFloat(p.amount).toFixed(2)}</td>
                                            <td>₱${parseFloat(p.amount_paid).toFixed(2)}</td>
                                            <td>${p.payment_date}</td>
                                        </tr>
                                    `;
                                });
                            }

                            $('#paymentsTable tbody').html(rows);

                        } else {
                            alert(response.message);
                        }
                    }
                });
            }

            loadPayments();

            /* =========================
               LOAD UNPAID BILLS
            ========================== */
            function loadUnpaidBills() {
                $.ajax({
                    url: '../../backend/php/billing.php?action=get_all_bills',
                    type: 'GET',
                    dataType: 'json',
                    success: function (response) {

                        let options = `<option value="">Select Unpaid Bill</option>`;

                        response.data.forEach(bill => {
                            if (bill.status === 'unpaid') {
                                options += `
                                    <option value="${bill.id}" data-amount="${bill.amount}">
                                        ${bill.consumer_name} - ₱${parseFloat(bill.amount).toFixed(2)}
                                    </option>
                                `;
                            }
                        });

                        $('#bill_id').html(options);
                    }
                });
            }

            /* =========================
               SHOW FORM
            ========================== */
            $('#recordPaymentBtn').on('click', function () {
                loadUnpaidBills();
                $('#paymentForm')[0].reset();
                $('#paymentFormContainer').show();
            });

            /* =========================
               AUTO FILL AMOUNT
            ========================== */
            $('#bill_id').on('change', function () {
                let amount = $(this).find(':selected').data('amount');
                $('#amount_paid').val(amount || '');
            });

            /* =========================
               CANCEL FORM
            ========================== */
            $('#cancelBtn').on('click', function () {
                $('#paymentFormContainer').hide();
            });

            /* =========================
               SUBMIT PAYMENT
            ========================== */
            $('#paymentForm').on('submit', function (e) {
                e.preventDefault();

                $.ajax({
                    url: '../../backend/php/billing.php',
                    type: 'POST',
                    data: $(this).serialize(),
                    dataType: 'json',
                    success: function (response) {

                        alert(response.message);

                        if (response.status === 'success') {
                            $('#paymentFormContainer').hide();
                            loadPayments();
                        }
                    }
                });
            });

        });
    </script>
</body>
</html>
