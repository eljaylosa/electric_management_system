<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments - Electric Management System</title>
<link rel="icon" type="image/png" href="../../images/logo/electricity_logo2.png">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/theme.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../js/notification.js" defer></script>
<script src="../js/theme.js"></script>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="nav-logo">
            <div class="logo-image">
                <img src="../../images/logo/electricity_logo2.png" alt="Logo" height="100px" width="100px">
            </div>
            Electric <span style="font-style: italic;">MS</span>
        </div>
        <button class="nav-toggle" id="navToggle">&#9776;</button>
        <ul id="navMenu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="rates.html">Rates</a></li>
            <li><a href="consumers.html">Consumers</a></li>
            <li><a href="billing.html">Billing</a></li>
            <li><a href="payments.html">Payments</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li class="separator">|</li>
                <li><a href="admin_signup_requests.html" class="request-btn">Check Requests</a></li>
                <li>|</li>
                <li><a href="../../backend/php/auth.php?action=logout" class="logout-btn">Logout</a></li>
                <li style="position:relative;">
                    <a href="#" id="notifBell">🔔 
                        <span id="notifCount" style="
                            background:red;
                            color:white;
                            border-radius:50%;
                            padding:2px 6px;
                            font-size:12px;
                            "></span>
                    </a>
                    <div id="notifDropdown" style="
                        display:none;
                        position:absolute;
                        right:0;
                        background:white;
                        width:300px;
                        box-shadow:0 0 10px rgba(0,0,0,0.2);
                        max-height:300px;
                        overflow:auto;
                    "></div>
                </li>
                <li>
                    <button id="themeToggle">🌙</button>
                </li>
        </ul>
    </div>
</nav>

<div class="container">
    <h1>Payment Collection</h1>

    <button class="btn btn-success" id="recordPaymentBtn">Record New Payment</button>

    <!-- FILTERS -->
    <div class="filter-bar" style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">
        <input type="text" id="paymentSearch" placeholder="Search consumer...">

        <label for="dateFrom">Date From:</label>
        <input type="date" id="dateFrom">
        <label for="dateTo">Date To:</label>
        <input type="date" id="dateTo">

        <input type="number" id="minAmount" placeholder="Min ₱">
        <input type="number" id="maxAmount" placeholder="Max ₱">

        <select id="sortAmount">
            <option value="">Sort Amount</option>
            <option value="high">Highest First</option>
            <option value="low">Lowest First</option>
        </select>

        <select id="monthFilter">
            <option value="">All Months</option>
            <option value="01">January</option>
            <option value="02">February</option>
            <option value="03">March</option>
            <option value="04">April</option>
            <option value="05">May</option>
            <option value="06">June</option>
            <option value="07">July</option>
            <option value="08">August</option>
            <option value="09">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>
        
        <input type="number" id="yearFilter" placeholder="Year (e.g. 2026)">
        
        <select id="sortDate">
            <option value="">Sort Date</option>
            <option value="latest">Latest First</option>
            <option value="oldest">Oldest First</option>
        </select>
    </div>

    <!-- FORM -->
    <div id="paymentFormContainer" style="display:none; margin-top:20px;">
        <h2>Record New Payment</h2>

        <form id="paymentForm">
            <input type="hidden" name="action" value="record_payment">

            <label>Unpaid Bill</label>
            <select id="bill_id" name="bill_id" required></select>

            <label>Amount Paid</label>
            <input type="number" id="amount_paid" name="amount_paid" readonly required>

            <label>Payment Date</label>
            <input type="date" id="payment_date" name="payment_date" required>

            <button type="submit">Record Payment</button>
            <button type="button" class="btn btn-danger" id="cancelBtn">Cancel</button>
        </form>
    </div>

    <!-- TABLE -->
    <table id="paymentsTable">
        <thead>
            <tr>
                <th>Consumer</th>
                <th>Bill Amount</th>
                <th>Amount Paid</th>
                <th>Payment Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
$(document).ready(function(){

    $('#navToggle').click(function(){
        $('#navMenu').toggleClass('active');
    });

    let paymentsData = [];

    /* ================= LOAD PAYMENTS ================= */
    function loadPayments() {
        $.get('../../backend/php/billing.php?action=get_all_payments', function(res){

            if(res.status === 'success'){
                paymentsData = res.data;

                // default sort: latest first
                paymentsData.sort((a,b) => new Date(b.payment_date) - new Date(a.payment_date));

                renderPayments(paymentsData);
            }

        }, 'json');
    }

    /* ================= RENDER ================= */
    function renderPayments(data){

        let rows = '';

        if(data.length === 0){
            rows = '<tr><td colspan="4" style="text-align:center;">No payments found</td></tr>';
        } else {

            data.forEach(p=>{
                rows += `
                    <tr>
                        <td>${p.consumer_name}</td>
                        <td>₱${parseFloat(p.amount).toFixed(2)}</td>
                        <td>₱${parseFloat(p.amount_paid).toFixed(2)}</td>
                        <td>${p.payment_date}</td>
                        <!-- NEW -->
                        <td>
                            <button class="btn btn-primary printBtn" data-bill="${p.bill_id}">
                                📄 Print Receipt
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        $('#paymentsTable tbody').html(rows);
    }

    // click event for print button
    $('#paymentsTable tbody')
        .off('click.print')
        .on('click.print', '.printBtn', function () {

            let billId = $(this).data('bill');

            if (!billId) {
                alert('Invalid bill ID');
                return;
            }

            console.log('Printing receipt for bill:', billId);

            window.open(
                `receipt.html?id=${billId}`,
                '_blank',
                'width=800,height=1000'
            );
        });

    /* ================= FILTER ================= */
    function filterPayments(){

        let search = $('#paymentSearch').val().toLowerCase();
        let from = $('#dateFrom').val();
        let to = $('#dateTo').val();
        let min = parseFloat($('#minAmount').val()) || 0;
        let max = parseFloat($('#maxAmount').val()) || Infinity;

        let monthFilter = $('#monthFilter').val();
        let yearFilter = $('#yearFilter').val();
        let sortAmount = $('#sortAmount').val();
        let sortDate = $('#sortDate').val();

        let filtered = paymentsData.filter(p => {

            let matchesSearch = p.consumer_name.toLowerCase().includes(search);

            // DATE RANGE
            let matchesDate = true;
            if(from && p.payment_date < from) matchesDate = false;
            if(to && p.payment_date > to) matchesDate = false;

            // MONTH + YEAR
            let dateObj = new Date(p.payment_date);
            let month = ("0" + (dateObj.getMonth() + 1)).slice(-2);
            let year = dateObj.getFullYear().toString();

            let matchesMonth = monthFilter === "" || month === monthFilter;
            let matchesYear = yearFilter === "" || year === yearFilter;

            // AMOUNT
            let amount = parseFloat(p.amount_paid);
            let matchesAmount = amount >= min && amount <= max;

            return matchesSearch && matchesDate && matchesAmount && matchesMonth && matchesYear;
        });

        // SORT BY AMOUNT
        if(sortAmount === 'high'){
            filtered.sort((a,b)=> b.amount_paid - a.amount_paid);
        }
        if(sortAmount === 'low'){
            filtered.sort((a,b)=> a.amount_paid - b.amount_paid);
        }

        // SORT BY DATE
        if(sortDate === 'latest'){
            filtered.sort((a,b)=> new Date(b.payment_date) - new Date(a.payment_date));
        }
        if(sortDate === 'oldest'){
            filtered.sort((a,b)=> new Date(a.payment_date) - new Date(b.payment_date));
        }

        renderPayments(filtered);
    }

    // events

    $('#yearFilter').val(new Date().getFullYear());

    $('#paymentSearch, #dateFrom, #dateTo, #minAmount, #maxAmount, #yearFilter')
    .on('input', filterPayments);

    $('#sortAmount, #sortDate, #monthFilter')
    .on('change', filterPayments);


    /* ================= UNPAID BILLS ================= */
    function loadUnpaidBills(){
        $.get('../../backend/php/billing.php?action=get_all_bills', function(res){

            let options = '<option value="">Select Bill</option>';

            res.data.forEach(b=>{
                if(b.status === 'unpaid'){
                    options += `<option value="${b.id}" data-amount="${b.amount}">
                        ${b.consumer_name} - ₱${b.amount}
                    </option>`;
                }
            });

            $('#bill_id').html(options);

        }, 'json');
    }

    /* ================= FORM ================= */
    $('#recordPaymentBtn').click(function(){
        loadUnpaidBills();
        $('#paymentForm')[0].reset();
        $('#paymentFormContainer').show();
    });

    $('#cancelBtn').click(function(){
        $('#paymentFormContainer').hide();
    });

    $('#bill_id').change(function(){
        let amount = $(this).find(':selected').data('amount');
        $('#amount_paid').val(amount || '');
    });

    $('#paymentForm').submit(function(e){
        e.preventDefault();

        $.post('../../backend/php/billing.php', $(this).serialize(), function(res){

            alert(res.message);

            if(res.status === 'success'){
                $('#paymentFormContainer').hide();
                loadPayments();
            }

        }, 'json');
    });
    initNotifications();
    loadPayments();
});
</script>
</body>
</html>
