<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>
<link rel="icon" type="image/png" href="../../images/logo/electricity_logo2.png">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
:root {
    --bg-main: radial-gradient(circle at top left, #1e3a8a, #020617);
    --card-bg: rgba(255,255,255,0.08);
    --text-main: white;
    --text-sub: #94a3b8;
    --input-bg: rgba(255,255,255,0.1);
    --btn-primary: #3b82f6;
    --btn-success: #22c55e;
    --btn-warning: #f59e0b;
}

/* LIGHT MODE */
[data-theme="light"] {
    --bg-main: linear-gradient(135deg, #e2e8f0, #f8fafc);
    --card-bg: rgba(255,255,255,0.9);
    --text-main: #1e293b;
    --text-sub: #64748b;
    --input-bg: #f1f5f9;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-main);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: var(--text-main);
}

/* GLASS CARD */
.container {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 16px;
    width: 320px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    position: relative;
}

/* inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: var(--input-bg);
    color: var(--text-main);
    outline: none;
}

/* buttons */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.primary { background: var(--btn-primary); color: white; }
.success { background: var(--btn-success); color: white; }
.warning { background: var(--btn-warning); color: white; }

button:hover {
    opacity: 0.9;
}

/* loader */
.loader {
  border: 3px solid #fff;
  border-top: 3px solid transparent;
  border-radius: 50%;
  width: 14px;
  height: 14px;
  animation: spin 0.8s linear infinite;
  display: inline-block;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* message */
#message {
    text-align: center;
    font-size: 0.9rem;
    margin-top: 10px;
    color: #f87171;
}

/* toggle */
.theme-toggle {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 0.8rem;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    padding: 5px 10px;
    border-radius: 8px;
}
#step1 {
  text-align: center;

}
#step1 a {
  text-decoration: none;
}
#step1 a p {
  color: #1f7740;
  transition: .2s;
}
#step1 a p:hover {
  color: #2cdc6f;
}
</style>
</head>

<body>

  <div class="container">

    <div class="theme-toggle" id="themeToggle">🌙 Dark</div>
  
    <h2 style="text-align:center;">Forgot Password</h2>
  
    <div id="step1">
      <input id="email" placeholder="Enter email">
      <button class="primary" id="sendOtp">Send OTP</button>
      <a href="login.html"><p><- Back to login</p></a>
    </div>
    
    <div id="step2" style="display:none;">
      <input id="otp" placeholder="Enter OTP">
      <button class="warning" id="verifyOtp">Verify OTP</button>
    </div>
    
    <div id="step3" style="display:none;">
      <div style="position:relative;">
        <input id="newPassword" type="password" placeholder="New Password">
    
        <span id="togglePass" style="
            position:absolute;
            right:10px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            font-size:0.8rem;
            opacity:0.7;
        ">👁</span>
    </div>
  
      <button class="success" id="resetPassword">Reset Password</button>
    </div>
  
    <div id="message"></div>
  
  </div>

<script>

$('#togglePass').click(function () {
    let input = $('#newPassword');
    let type = input.attr('type') === 'password' ? 'text' : 'password';
    input.attr('type', type);

    $(this).text(type === 'password' ? '👁' : '🙈');
});

$('#showNewPass').on('change', function () {
    $('#newPassword').attr('type', this.checked ? 'text' : 'password');
});

function showMessage(msg, success = false) {
  $('#message').text(msg).css('color', success ? '#22c55e' : '#f87171');
}

// STEP 1
$('#sendOtp').click(function () {
  let btn = $(this);
  btn.html('<span class="loader"></span>').prop('disabled', true);

  $.post('../../backend/php/auth.php', {
    action: 'forgot_password',
    email: $('#email').val()
  }, function(res) {

    showMessage(res.message, res.status === 'success');

    btn.text('Send OTP').prop('disabled', false);

    if (res.status === 'success') {
      $('#step1').hide();
      $('#step2').fadeIn(300);
    }

  }, 'json');
});

// STEP 2
$('#verifyOtp').click(function () {
  let btn = $(this);
  btn.html('<span class="loader"></span>').prop('disabled', true);

  $.post('../../backend/php/auth.php', {
    action: 'verify_otp',
    email: $('#email').val(),
    otp: $('#otp').val()
  }, function(res){

    showMessage(res.message, res.status === 'success');

    btn.text('Verify OTP').prop('disabled', false);

    if (res.status === 'success') {
      $('#step2').hide();
      $('#step3').fadeIn(300);
    }

  }, 'json');
});

// STEP 3
$('#resetPassword').click(function () {

  let password = $('#newPassword').val().trim();

  // 🔥 EMPTY CHECK
  if (password === '') {
    showMessage('❌ Please enter a password', false);
    return;
  }

  // 🔥 LENGTH CHECK (4–6 chars only)
  if (password.length < 4 || password.length > 8) {
    showMessage('❌ Password must be 4 to 8 characters only', false);
    return;
  }

  let btn = $(this);
  btn.html('<span class="loader"></span>').prop('disabled', true);

  $.post('../../backend/php/auth.php', {
    action: 'reset_password',
    email: $('#email').val(),
    password: password
  }, function(res){

    showMessage(res.message, res.status === 'success');

    btn.text('Reset Password').prop('disabled', false);

    if (res.status === 'success') {
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1000);
    }

  }, 'json');
});


// load saved theme
if (localStorage.getItem("theme") === "light") {
    document.documentElement.setAttribute("data-theme", "light");
    $('#themeToggle').text('☀️ Light');
}

// toggle
$('#themeToggle').click(function () {
    let current = document.documentElement.getAttribute("data-theme");

    if (current === "light") {
        document.documentElement.removeAttribute("data-theme");
        localStorage.setItem("theme", "dark");
        $(this).text('🌙 Dark');
    } else {
        document.documentElement.setAttribute("data-theme", "light");
        localStorage.setItem("theme", "light");
        $(this).text('☀️ Light');
    }
});

</script>

</body>
</html>
