<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Electric Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <img src="../../images/logo/electricity_logo.png" alt="" height="100px" width="100px">
                <p>Electric MS</p>
            </div>
            
            <button class="nav-toggle" id="navToggle">&#9776;</button>
            <ul id="navMenu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="consumers.html">Consumers</a></li>
                <li><a href="billing.html">Billing</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="../../backend/php/auth.php?action=logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Dashboard, <span style="opacity: .75;">Admin</span></h1>
        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Consumers</h3>
                <div class="value" id="totalConsumers">0</div>
            </div>
            <div class="card">
                <h3>Total Bills</h3>
                <div class="value" id="totalBills">0</div>
            </div>
            <div class="card">
                <h3>Total Collections</h3>
                <div class="value" id="totalCollections">₱0.00</div>
            </div>
        </div>

        <h2>Recent Activities</h2>
        <div class="table-responsive">
            <table id="recentActivitiesTable">
                <thead>
                    <tr>
                        <th>Activity</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Activities will be loaded here via AJAX -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Mobile Navigation Toggle
            $('#navToggle').on('click', function() {
                $('#navMenu').toggleClass('active');
            });

            // Load dashboard data
            function loadDashboardData() {
                $.ajax({
                    url: '../../backend/php/consumers.php?action=get_all',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            $('#totalConsumers').text(response.data.length);
                        }
                    }
                });

                $.ajax({
                    url: '../../backend/php/billing.php?action=get_all_bills',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            $('#totalBills').text(response.data.length);
                            let totalCollections = 0;
                            response.data.forEach(bill => {
                                if (bill.status === 'paid') {
                                    totalCollections += parseFloat(bill.amount);
                                }
                            });
                            $('#totalCollections').text('₱' + totalCollections.toFixed(2));
                        }
                    }
                });

                // load recent activities (for simplicity, we will just show recent bills)
                $.ajax({
                    url: '../../backend/php/billing.php?action=get_recent_bills',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            const activitiesTableBody = $('#recentActivitiesTable tbody');
                            activitiesTableBody.empty();
                            response.data.forEach(bill => {
                                const activityRow = 
                                `
                                    <tr>
                                        <td>Bill for ${bill.consumer_name} - ₱${bill.amount}</td>
                                        <td>${new Date(bill.due_date).toLocaleDateString()}</td>
                                        <td>${bill.status.charAt(0).toUpperCase() + bill.status.slice(1)}</td>
                                    </tr>
                                `;
                            activitiesTableBody.append(activityRow);
                            });
                        }
                    }
                });
            }
            loadDashboardData();
        });
    </script>
</body>
</html>
