<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Electric Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-image">
                    <img src="../../images/logo/electricity_logo2.png" alt="Logo" height="100px" width="100px">
                </div>
                Electric <span style="font-style: italic;">MS</span>
            </div>
            <button class="nav-toggle" id="navToggle">&#9776;</button>
            <ul id="navMenu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="rates.html">Rates</a></li>
                <li><a href="consumers.html">Consumers</a></li>
                <li><a href="billing.html">Billing</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="reports.html">Reports</a></li>
                <li><a href="../../backend/php/auth.php?action=logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Dashboard, <span style="opacity: 0.75;">Admin</span></h1>
        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Consumers</h3>
                <div class="value" id="totalConsumers">0</div>
            </div>
            <div class="card">
                <h3>Total Bills</h3>
                <div class="value" id="totalBills">0</div>
            </div>
            <div class="card">
                <h3>Total Collections</h3>
                <div class="value" id="totalCollections">$0.00</div>
            </div>
        </div>

        <h2>Recent Activities</h2>
        <div class="table-responsive">
            <table id="recentActivitiesTable">
                <thead>
                    <tr>
                        <th>Activity</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Activities will be loaded here via AJAX -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Mobile Navigation Toggle
            $('#navToggle').on('click', function() {
                $('#navMenu').toggleClass('active');
            });

            // Load dashboard data
            function loadDashboardData() {
                $.ajax({
                    url: '../../backend/php/consumers.php?action=get_all',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            $('#totalConsumers').text(response.data.length);
                        }
                    }
                });

                $.ajax({
                    url: '../../backend/php/billing.php?action=get_all_bills',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            $('#totalBills').text(response.data.length);
                            let totalCollections = 0;
                            response.data.forEach(bill => {
                                if (bill.status === 'paid') {
                                    totalCollections += parseFloat(bill.amount);
                                }
                            });
                            $('#totalCollections').text('₱' + totalCollections.toFixed(2));
                        }
                    }
                });

                // load recent activities (for simplicity, we will just show recent bills)
                // load also when a user pay bills on their customer dashboard, so we can show that activity here in real time
                // fix "paid" color should be green and "unpaid" color should be red, also make the status text bold
                    $.ajax({
                        url: '../../backend/php/billing.php?action=get_all_bills',
                        type: 'GET',
                        dataType: 'json',
                        success: function(response) {
                            if (response.status === 'success') {
                                let rows = '';
                                // show only the 5 most recent bills
                                let recentBills = response.data.slice(-5).reverse();
                                recentBills.forEach(bill => {
                                    rows += `
                                        <tr>
                                            <td>${bill.consumer_name} - ₱${bill.amount}</td>
                                            <td>${bill.due_date}</td>
                                            <td style="color: ${bill.status === 'paid' ? '#2ecc71' : '#e74c3c'}; font-weight: bold;">${bill.status.toUpperCase()}</td>
                                        </tr>
                                    `;
                                });
                                $('#recentActivitiesTable tbody').html(rows);
                            }
                        }
                    });
                
                

            }

            loadDashboardData();
        });
    </script>
</body>
</html>
