<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Electric Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <img src="../../images/logo/electricity_logo.png" alt="" height="100px" width="100px">
                <p>Electric MS</p>
            </div>
            
            <button class="nav-toggle" id="navToggle">&#9776;</button>
            <ul id="navMenu">
                <li><a href="customer_dashboard.html">My Dashboard</a></li>
                <li><a href="../../backend/php/auth.php?action=logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Welcome, <span id="customerName" style="opacity: .75;">Customer</span></h1>
        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Bills</h3>
                <div class="value" id="totalBills">0</div>
            </div>
            <div class="card">
                <h3>Unpaid Amount</h3>
                <div class="value" id="unpaidAmount">₱0.00</div>
            </div>
            <div class="card">
                <h3>Meter Number</h3>
                <div class="value" id="meterNo" style="font-size: 1.2rem;">-</div>
            </div>
        </div>

        <h2>My Billing History</h2>
        <div class="table-responsive">
            <table id="billsTable">
                <thead>
                    <tr>
                        <th>Due Date</th>
                        <th>Reading (Prev/Curr)</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Bills will be loaded here via AJAX -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Mobile Navigation Toggle
            $('#navToggle').on('click', function() {
                $('#navMenu').toggleClass('active');
            });

            // Load customer data and bills
            function loadCustomerData() {
                $.ajax({
                    url: '../../backend/php/billing.php?action=get_all_bills',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            let rows = '';
                            let totalBills = response.data.length;
                            let unpaidAmount = 0;
                            
                            if (totalBills > 0) {
                                $('#customerName').text(response.data[0].consumer_name);
                                // Note: In a real app, we'd have a separate profile API for meter_no
                                // For now, we'll just show the bills
                            }

                            if (totalBills === 0) {
                                rows = '<tr><td colspan="4" style="text-align:center;">No billing history found.</td></tr>';
                            } else {
                                response.data.forEach(bill => {
                                    if (bill.status === 'unpaid') {
                                        unpaidAmount += parseFloat(bill.amount);
                                    }
                                    rows += `
                                        <tr>
                                            <td data-label="Due Date">${bill.due_date}</td>
                                            <td data-label="Reading">${bill.prev_reading} / ${bill.curr_reading}</td>
                                            <td data-label="Amount">₱${parseFloat(bill.amount).toFixed(2)}</td>
                                            <td data-label="Status" style="color: ${bill.status === 'paid' ? '#2ecc71' : '#e74c3c'}; font-weight: bold;">${bill.status.toUpperCase()}</td>
                                            // add action for print receipt if bill is paid, it should generate a pdf receipt with the bill details
                                            <td data-label="Action">
                                                ${bill.status === 'paid' ? `<a href="receipt.html?bill_id=${bill.id}" target="_blank" class="btn btn-sm">Print Receipt</a>` : ''}
                                        </tr>
                                    `;
                                });
                            }
                            $('#billsTable tbody').html(rows);
                            $('#totalBills').text(totalBills);
                            $('#unpaidAmount').text('₱' + unpaidAmount.toFixed(2));
                        }
                    },
                    error: function() {
                        $('#billsTable tbody').html('<tr><td colspan="4" style="text-align:center; color:red;">Failed to load data.</td></tr>');
                    }
                });
            }

            loadCustomerData();
        });
    </script>
</body>
</html>
