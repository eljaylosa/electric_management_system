<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Electric Management System</title>
    <link rel="icon" type="image/png" href="../../images/logo/electricity_logo2.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/theme.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../js/notification.js" defer></script>
    <script src="../js/theme.js"></script>
</head>
<style>
    /* Container ng button para sa proper spacing */
.support-button {
    background: linear-gradient(45deg, #007dfe, #00c6ff); /* GCash Blue Gradient */
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 50px; /* Rounded shape */
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease; /* Para sa smooth animation */
    box-shadow: 0 4px 15px rgba(0, 125, 254, 0.3);
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Hover Effect: Lalaki ng konti at mas mag-glow */
.support-button:hover {
    transform: translateY(-3px); /* Tatalon ng konti pataas */
    box-shadow: 0 8px 25px rgba(0, 125, 254, 0.5);
    background: linear-gradient(45deg, #00c6ff, #007dfe); /* Reverse gradient */
}

/* Active Effect: Kapag pinindot */
.support-button:active {
    transform: translateY(1px);
}

/* Ang "Shine" Animation: May dadaan na liwanag sa button */
.support-button::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 20%;
    height: 200%;
    background: rgba(255, 255, 255, 0.3);
    transform: rotate(30deg);
    transition: all 0.5s;
}

.support-button:hover::after {
    left: 120%; /* Lilipad yung liwanag sa kabilang side */
}

</style>

<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-image">
                    <img src="../../images/logo/electricity_logo2.png" alt="Logo" height="100px" width="100px">
                </div>
                Electric <span style="font-style: italic;">MS</span>
            </div>
            <button class="nav-toggle" id="navToggle">&#9776;</button>
            <ul id="navMenu">
                <li><a href="customer_dashboard.html">My Dashboard</a></li>
                <li><a href="customer_profile.html">Profile</a></li>
                <li>|</li>
                <li><a href="../../backend/php/auth.php?action=logout" class="logout-btn">Logout</a></li>
                <li style="position:relative;">
                    <a href="#" id="notifBell">🔔 
                        <span id="notifCount" style="
                            background:red;
                            color:white;
                            border-radius:50%;
                            padding:2px 6px;
                            font-size:12px;
                            "></span>
                    </a>
                    <div id="notifDropdown" style="
                        display:none;
                        position:absolute;
                        right:0;
                        background:white;
                        width:300px;
                        box-shadow:0 0 10px rgba(0,0,0,0.2);
                        max-height:300px;
                        overflow:auto;
                    "></div>
                </li>
                <li>
                    <button id="themeToggle">🌙</button>
                </li>
                <li>|</li>
                <li>
                    <button class="support-button" onclick="location.href='dev-support.html'">
                        <span>❤️</span> Support the devs
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Welcome, <span id="customerName" style="opacity: .75;">Customer</span></h1>
        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Bills</h3>
                <div class="value" id="totalBills">0</div>
            </div>
            <div class="card">
                <h3>Unpaid Amount</h3>
                <div class="value" id="unpaidAmount">₱0.00</div>
            </div>
            <div class="card">
                <h3>Meter Number</h3>
                <div class="value" id="meterNo" style="font-size: 1.2rem;">-</div>
            </div>
            <div class="card" style="background-color: rgba(200, 17, 17, 0.705);">
                <h3 style="color: white;">Due Bills</h3>
                <div class="value" id="totalDueConsumers" style="color: white;">0</div>
            </div>
        </div>

        <h2>My Billing and Payment History</h2>
        <div class="filters" style="margin: 15px 0; display: flex; gap: 10px;">
    
            <select id="statusFilter">
                <option value="all">All Status</option>
                <option value="paid">Paid</option>
                <option value="unpaid">Unpaid</option>
                <option value="due-bills">Due Bills</option>
            </select>
        
            <select id="sortFilter">
                <option value="latest">Latest</option>
                <option value="oldest">Oldest</option>
            </select>

        </div>
        <div class="table-responsive">
            <table id="billsTable">
                <thead>
                    <tr>
                        <th>Due Date</th>
                        <th>Reading (Prev/Curr)</th>
                        <th>kWh Used</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Bills will be loaded here via AJAX -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Mobile nav toggle
            $('#navToggle').on('click', function() {
                $('#navMenu').toggleClass('active');
            });

            // load customer name from consumer table and meter number
            $.ajax({
                url: '../../backend/php/consumers.php?action=get_consumer_info',
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    if (response.status === 'success') {
                        $('#customerName').text(response.data.name);
                        $('#meterNo').text(response.data.meter_no);
                    }
                }
            });
        
            // Load customer data
            let allBills = [];
            function loadCustomerData() {
                $.ajax({
                    url: '../../backend/php/billing.php?action=get_all_bills',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                            if (response.status === 'success') {

                                allBills = response.data; // store globally

                                renderTable(allBills);

                                $('#totalBills').text(allBills.length);

                                let unpaidAmount = allBills
                                    .filter(b => b.status === 'unpaid')
                                    .reduce((sum, b) => sum + parseFloat(b.amount), 0);

                                $('#unpaidAmount').text('₱' + unpaidAmount.toFixed(2));

                                let dueBillsCount = allBills.filter(b => isDue(b)).length;
                                $('#totalDueConsumers').text(dueBillsCount);

                            }
                            
                            // let rows = '';
                            // let totalBills = response.data.length;
                            // let unpaidAmount = 0;
                            
                            // if (totalBills > 0) {
                            //     $('#customerName').text(response.data[0].consumer_name);
                            // }
        
                            // if (totalBills === 0) {
                            //     rows = '<tr><td colspan="5" style="text-align:center;">No billing history found.</td></tr>';
                            // } else {
                            //     response.data.forEach(bill => {
                            //         if (bill.status === 'unpaid') {
                            //             unpaidAmount += parseFloat(bill.amount);
                            //         }
                            //         rows += `
                            //             <tr>
                            //                 <td>${bill.due_date}</td>
                            //                 <td>${bill.prev_reading} / ${bill.curr_reading}</td>
                            //                 <td>₱${parseFloat(bill.amount).toFixed(2)}</td>
                            //                 <td style="color: ${bill.status === 'paid' ? '#2ecc71' : '#e74c3c'}; font-weight: bold;">${bill.status.toUpperCase()}</td>
                            //                 <td>
                            //                     ${bill.status === 'paid' ? `
                            //                         <button class="btn btn-primary viewBillBtn" data-id="${bill.id}">View Receipt</button>
                            //                     ` : `
                            //                         <div style="display:flex; gap:5px;">
                            //                             <button class="btn btn-success gcashBtn" data-id="${bill.id}">GCash</button>
                            //                             <button class="btn btn-warning mayaBtn" data-id="${bill.id}">Maya</button>
                            //                         </div>
                            //                     `}
                            //                 </td>
                            //             </tr>
                            //         `;
                            //     });
                            // }
                            // $('#billsTable tbody').html(rows);
                            // $('#totalBills').text(totalBills);
                            // $('#unpaidAmount').text('₱' + unpaidAmount.toFixed(2));
                        
                    }
                });
            }

            function isDue(bill) {
                if (!bill.due_date) return false;

                const today = new Date();
                const dueDate = new Date(bill.due_date + "T00:00:00");

                return bill.status === 'unpaid' && dueDate < today;
            }

            function getBillStatus(bill) {
                if (bill.status === 'paid') return 'paid';
                if (isDue(bill)) return 'due';
                return 'unpaid';
            }

            function getKwhColor(kwh) {
                let numKwh = parseFloat(kwh) || 0;

                if (numKwh >= 500) return '#e74c3c';  // RED - High
                if (numKwh >= 200) return '#f39c12';  // ORANGE - Medium  
                if (numKwh >= 50) return '#f1c40f';   // YELLOW - Normal

                return '#27ae60'; // GREEN - Low
            }

            function renderTable(data) {
                let rows = '';

                if (data.length === 0) {
                    rows = '<tr><td colspan="5" style="text-align:center;">No billing history found.</td></tr>';
                } else {
                    data.forEach(bill => {
                        let kwh = 0;

                       
                        const prev = parseFloat(bill.prev_reading);
                        const curr = parseFloat(bill.curr_reading);

                        if (!isNaN(prev) && !isNaN(curr)) {
                            kwh = (curr - prev).toFixed(2);
                        }

                        const kwhColor = getKwhColor(kwh);

                        const is_due = isDue(bill);

                        const statusText = is_due 
                            ? 'DUE' 
                            : (bill.status || 'unpaid').toUpperCase();

                        const statusColor = is_due 
                            ? '#c0392b' 
                            : (bill.status === 'paid' ? '#2ecc71' : '#e74c3c');

                        rows += `
                            <tr>
                                <td>${bill.due_date}</td>
                                <td>${bill.prev_reading} / ${bill.curr_reading}</td>
                                <td style="color:${kwhColor}; font-weight:bold;"">${kwh} kWh</td>
                                <td>₱${parseFloat(bill.amount).toFixed(2)}</td>

                                <!-- ✅ SINGLE STATUS COLUMN -->
                                <td style="color:${statusColor}; font-weight:bold;">
                                    ${statusText}
                                </td>

                                <td>
                                    ${bill.status === 'paid' ? `
                                        <button class="btn btn-primary viewBillBtn" data-id="${bill.id}">View Receipt</button>
                                    ` : `
                                        <div style="display:flex; gap:5px;">
                                            <button class="btn btn-success gcashBtn" data-id="${bill.id}">GCash</button>
                                            <button class="btn btn-warning mayaBtn" data-id="${bill.id}">Maya</button>
                                        </div>
                                    `}
                                </td>
                            </tr>
                        `;
                    });
                }

                $('#billsTable tbody').html(rows);
            }

            $('#statusFilter, #sortFilter').on('change', function () {

                let filtered = [...allBills];

                const status = $('#statusFilter').val();
                const sort = $('#sortFilter').val();

                // STATUS FILTER
                if (status === 'paid') {
                    filtered = filtered.filter(b => b.status === 'paid');
                }
                else if (status === 'unpaid') {
                    filtered = filtered.filter(b => b.status === 'unpaid');
                }
                else if (status === 'due-bills') {
                    filtered = filtered.filter(b => isDue(b));
                }

                // SORT FILTER
                filtered.sort((a, b) => {
                    let dateA = new Date(a.due_date);
                    let dateB = new Date(b.due_date);

                    return sort === 'latest' ? dateB - dateA : dateA - dateB;
                });

                renderTable(filtered);
            });
        
            // Bill actions (event delegation)
            $(document).on('click', '.gcashBtn, .mayaBtn', function() {
                const billId = $(this).data('id');
                const method = $(this).hasClass('gcashBtn') ? 'gcash' : 'maya';
                window.location.href = `payment_gateway.html?bill_id=${billId}&method=${method}`;
            });
        
            $(document).on('click', '.viewBillBtn', function(e) {
                e.preventDefault();
                const billId = $(this).data('id');
                window.open(`receipt.html?id=${billId}`, '_blank', 'width=800,height=1000');
            });
        
            // Initial load
            initNotifications();
            loadCustomerData();
        });
        </script>

    
    </body>
</html>
