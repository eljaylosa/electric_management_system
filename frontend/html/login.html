<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Electric Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<style>

@media (max-width: 768px) {
    body {
        overflow: hidden;
        padding: 20px;
    }
    

}

   body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top left, #1e3a8a, #020617);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    color: white;
    overflow: hidden;
}



/* floating glow effect */
body::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: #3b82f6;
    filter: blur(120px);
    opacity: 0.4;
    top: -100px;
    left: -100px;
}

body::after {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: #22c55e;
    filter: blur(120px);
    opacity: 0.3;
    bottom: -100px;
    right: -100px;
}

/* GLASS CARD */
.container {
    position: relative;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    padding: 35px;
    border-radius: 18px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: fadeIn 0.5s ease;
    border: 1px solid rgba(255,255,255,0.1);
}
h1,
form label {
    color: white;
}
form label {
    margin: 0;
}

/* LOGO / TITLE */
.logo {
    text-align: center;
    margin-bottom: 15px;
}

.logo h1 {
    margin: 0;
    font-size: 1.8rem;
    color: white;
    letter-spacing: 1px;
}

.logo span {
    font-size: 0.8rem;
    color: #94a3b8;
}

/* inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
}

input::placeholder {
    color: #cbd5f5;
}

input:focus {
    box-shadow: 0 0 0 2px #3b82f6;
}

/* button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(59,130,246,0.4);
}

/* message */
#loginMessage {
    text-align: center;
    margin-top: 10px;
    font-size: 0.9rem;
    color: #f87171;
}

/* links */
p {
    text-align: center;
    margin: 6px 0;
    color: #cbd5f5;
}

a {
    color: #60a5fa;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

.show-pass {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
    font-size: 0.9rem;
    color: #cbd5f5;
}

/* 🔥 override global input */
.show-pass input {
    width: auto;
    margin: 0;
    cursor: pointer;
}

/* optional: make it look cleaner */
.show-pass label {
    cursor: pointer;
}

/* animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.theme-toggle {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
}

/* switch */
.switch {
    position: relative;
    display: inline-block;
    width: 40px;
    height: 20px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    cursor: pointer;
    background: #334155;
    border-radius: 20px;
    inset: 0;
    transition: 0.3s;
}

.slider::before {
    content: "";
    position: absolute;
    height: 14px;
    width: 14px;
    left: 3px;
    top: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
}

input:checked + .slider {
    background: #22c55e;
}

input:checked + .slider::before {
    transform: translateX(20px);
}

body.light-mode {
    background: linear-gradient(135deg, #e0f2fe, #f8fafc);
    color: #1e293b;
}

body.light-mode .container {
    background: white;
    color: #1e293b;
}

body.light-mode input {
    background: #f1f5f9;
    color: #1e293b;
}

body.light-mode input::placeholder {
    color: #64748b;
}

body.light-mode h1,
body.light-mode label {
    color: #1e293b;
}

body.light-mode p {
    color: #475569;
}

body.light-mode a {
    color: #2563eb;
}
</style>

<body>
    <div class="container" style="max-width: 400px; margin-top: 50px;">
        <div class="logo">
            <h1>⚡ Electric MS</h1>
            <span>Powering Smart Energy Management</span>
        </div>
        <div class="theme-toggle">
            <span>🌙</span>
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
            <span>☀️</span>
        </div>
        <h1 style="text-align: center;">Login</h1>
        <form id="loginForm">
            <input type="hidden" name="action" value="login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <div class="show-pass">
                <input type="checkbox" id="showPass">
                <label for="showPass">Show Password</label>
            </div>
            <button type="submit">Login</button>
        </form>
        <div id="loginMessage" style="text-align: center; margin-top: 10px; color: #e74c3c;"></div>
        <p>Are you a new customer?</p>
        <p><a href="signup-requests.html">Submit a request here</a></p>
        <p><a href="change_password.html">Forgot Password?</a></p>
    </div>

    <script>

        // load saved theme
        if (localStorage.getItem('theme') === 'light') {
            $('body').addClass('light-mode');
            $('#themeToggle').prop('checked', true);
        }

        // toggle theme
        $('#themeToggle').on('change', function() {
            if (this.checked) {
                $('body').addClass('light-mode');
                localStorage.setItem('theme', 'light');
            } else {
                $('body').removeClass('light-mode');
                localStorage.setItem('theme', 'dark');
            }
        });

        $('#showPass').on('change', function() {
            $('#password').attr('type', this.checked ? 'text' : 'password');
        });

        $(document).ready(function() {
            $('#loginForm').on('submit', function(e) {
                e.preventDefault();

                let btn = $('button[type="submit"]');
                btn.text('Logging in...').prop('disabled', true);

                $('#loginMessage').text('');

                $.ajax({
                    url: '../../backend/php/auth.php',
                    type: 'POST',
                    data: $(this).serialize(),
                    dataType: 'json',

                    success: function(response) {

                        btn.text('Login').prop('disabled', false);

                        if (response.status === 'success') {

                            if (response.role === 'customer') {
                                window.location.href = 'customer_dashboard.html';
                            } else {
                                window.location.href = 'dashboard.html';
                            }

                        } else {
                            $('#loginMessage').text(response.message);
                        }
                    },

                    error: function() {
                        btn.text('Login').prop('disabled', false);
                        $('#loginMessage').text('Server error. Try again.');
                    }
                });
            });
        });

        // $('#showPass').on('change', function() {
        //     $('#password').attr('type', this.checked ? 'text' : 'password');
        // });
        // $(document).ready(function() {
        //     $('#loginForm').on('submit', function(e) {
        //         e.preventDefault();
        //         $.ajax({
        //             url: '../../backend/php/auth.php',
        //             type: 'POST',
        //             data: $(this).serialize(),
        //             dataType: 'json',
        //             success: function(response) {
        //                 if (response.status === 'success') {
        //                     if (response.role === 'customer') {
        //                         window.location.href = 'customer_dashboard.html';
        //                     } else {
        //                         window.location.href = 'dashboard.html';
        //                     }
        //                 } else {
        //                     $('#loginMessage').text(response.message);
        //                 }
        //             },
        //             error: function() {
        //                 $('#loginMessage').text('An error occurred. Please try again.');
        //             }
        //         });
        //     });
        // });
    </script>
</body>
</html>
