<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Receipt - Electric Management System</title>
    <link rel="icon" type="image/png" href="../../images/logo/electricity_logo2.png">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #fff; }
        .receipt-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 30px;
            border: 2px solid #eee;
            border-radius: 0;
            box-shadow: none;
        }
        .receipt-header {
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .receipt-header h1 { margin: 0; color: var(--primary-color); }
        .receipt-details { margin-bottom: 20px; }
        .receipt-details div {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f9f9f9;
        }
        .receipt-details span.label { font-weight: bold; color: #555; }
        .receipt-total {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #eee;
            text-align: right;
        }
        .receipt-total .amount {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        .receipt-footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.85rem;
            color: #888;
        }
        .no-print {
            text-align: center;
            margin-bottom: 20px;
        }
        @media print {
            .no-print { display: none; }
            .receipt-container { border: none; margin: 0; padding: 0; width: 100%; }
            body { padding: 0; }
        }
    </style>
</head>
<body>
    <div class="no-print" style="margin-top: 20px;">
        <button class="btn btn-primary" onclick="window.print()">Print Receipt</button>
        <button class="btn btn-danger" onclick="window.close()">Close</button>
    </div>

    <div class="receipt-container" id="receiptContent">
        <div class="receipt-header">
            <h1>ELECTRIC MS</h1>
            <p>Official Payment Receipt</p>
        </div>

        <div class="receipt-details">
            <div><span class="label">Receipt No:</span> <span id="receiptNo">#000</span></div>
            <div><span class="label">Date:</span> <span id="receiptDate"></span></div>
            <br>
            <div><span class="label">Consumer Name:</span> <span id="consumerName"></span></div>
            <div><span class="label">Address:</span> <span id="consumerAddress"></span></div>
            <div><span class="label">Meter Number:</span> <span id="meterNo"></span></div>
            <br>
            <div><span class="label">Previous Reading:</span> <span id="prevReading">0</span></div>
            <div><span class="label">Current Reading:</span> <span id="currReading">0</span></div>
            <div><span class="label">Consumption:</span> <span id="consumption">0 kWh</span></div>
            <br>
            <div><span class="label">Due Date:</span> <span id="dueDate"></span></div>
            <div><span class="label">Status:</span> <span id="status" style="font-weight: bold;"></span></div>
        </div>

        <div class="receipt-total">
            <span style="font-weight: bold; margin-right: 10px;">TOTAL AMOUNT PAID:</span>
            <span class="amount" id="totalAmount">₱0.00</span>
        </div>

        <div class="receipt-footer">
            <p>Thank you for your payment!</p>
            <p>This is a computer-generated receipt.</p>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            const urlParams = new URLSearchParams(window.location.search);
            const billId = urlParams.get('id');

            if (billId) {
                $.ajax({
                    url: `../../backend/php/billing.php?action=get_bill_by_id&id=${billId}`,
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            const bill = response.data;
                            $('#receiptNo').text('#' + bill.id.toString().padStart(4, '0'));
                            $('#receiptDate').text(new Date().toLocaleDateString());
                            $('#consumerName').text(bill.consumer_name);
                            $('#consumerAddress').text(bill.address);
                            $('#meterNo').text(bill.meter_no);
                            $('#prevReading').text(bill.prev_reading);
                            $('#currReading').text(bill.curr_reading);
                            $('#consumption').text((bill.curr_reading - bill.prev_reading).toFixed(2) + ' kWh');
                            $('#dueDate').text(bill.due_date);
                            $('#status').text(bill.status.toUpperCase()).css('color', bill.status === 'paid' ? '#2ecc71' : '#e74c3c');
                            $('#totalAmount').text('₱' + parseFloat(bill.amount).toFixed(2));
                        } else {
                            alert('Error: ' + response.message);
                        }
                    },
                    error: function() {
                        alert('Failed to load receipt data.');
                    }
                });
            } else {
                alert('No bill ID provided.');
            }
        });
    </script>
</body>
</html>
