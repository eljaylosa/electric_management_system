<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Electric Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 50px;">
        <h1 style="text-align: center;">Login</h1>
        <form id="loginForm">
            <input type="hidden" name="action" value="login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Login</button>
        </form>
        <div id="loginMessage" style="text-align: center; margin-top: 10px; color: #e74c3c;"></div>
    </div>

    <script>
        $(document).ready(function() {
            $('#loginForm').on('submit', function(e) {
                e.preventDefault();
                $.ajax({
                    url: '../../backend/php/auth.php',
                    type: 'POST',
                    data: $(this).serialize(),
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            if (response.role === 'customer') {
                                window.location.href = 'customer_dashboard.html';
                            } else {
                                window.location.href = 'dashboard.html';
                            }
                        } else {
                            $('#loginMessage').text(response.message);
                        }
                    },
                    error: function() {
                        $('#loginMessage').text('An error occurred. Please try again.');
                    }
                });
            });
        });
    </script>
</body>
</html>

<script>
    // Add sign-up link after the form
    $(document).ready(function() {
        $('#loginForm').after('<p style="text-align: center; margin-top: 20px;">Are you a customer? <a href="signup.html">Sign up here</a></p>');
    });
</script>
