<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumers - Electric Management System</title>
    <link rel="icon" type="image/png" href="../../images/logo/electricity_logo2.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/theme.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../js/notification.js"></script>
    <script src="../js/theme.js"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-image">
                    <img src="../../images/logo/electricity_logo2.png" alt="Logo" height="100px" width="100px">
                </div>
                Electric <span style="font-style: italic;">MS</span>
            </div>
            <button class="nav-toggle" id="navToggle">&#9776;</button>
            <ul id="navMenu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="rates.html">Rates</a></li>
                <li><a href="consumers.html">Consumers</a></li>
                <li><a href="billing.html">Billing</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="reports.html">Reports</a></li>
                <li class="separator">|</li>
                <li><a href="admin_signup_requests.html" class="request-btn">Check Requests</a></li>
                <li>|</li>
                <li><a href="../../backend/php/auth.php?action=logout" class="logout-btn">Logout</a></li>
                <li style="position:relative;">
                    <a href="#" id="notifBell">🔔 
                        <span id="notifCount" style="
                            background:red;
                            color:white;
                            border-radius:50%;
                            padding:2px 6px;
                            font-size:12px;
                            "></span>
                    </a>
                    <div id="notifDropdown" style="
                        display:none;
                        position:absolute;
                        right:0;
                        background:white;
                        width:300px;
                        box-shadow:0 0 10px rgba(0,0,0,0.2);
                        max-height:300px;
                        overflow:auto;
                    "></div>
                </li>
                <li>
                    <button id="themeToggle">🌙</button>
                </li>
            </ul>
        </div>
    </nav>


    <div id="deleteModal" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    ">
        <div style="background:white; padding:20px; border-radius:8px; width:300px;">
            <h3>🔒 Confirm Delete</h3>
            <input type="password" id="deletePassword" placeholder="Enter password" style="width:100%; padding:10px; margin:10px 0;">
            
            <button id="confirmDelete" class="btn btn-danger" style="width:100%;">Delete</button>
            <button id="cancelDelete" class="btn btn-secondary" style="width:100%; margin-top:10px;">Cancel</button>
        </div>
    </div>



    <div class="container">
        <h1>Consumer Management</h1>
        <button class="btn btn-success" id="addConsumerBtn">Add New Consumer</button>
        <a href="trash.html"><button class="btn">🗑 Trash</button></a>

        <div class="filter-bar" style="margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="searchInput" placeholder="Search name / meter / address..." style="flex:1; padding:10px;">
        
            <select id="categoryFilter">
                <option value="">Loading...</option>
            </select>
        </div>

        <div id="consumerFormContainer" style="display: none; margin-top: 20px;">
            <h2 id="formTitle">Add New Consumer</h2>
            <form id="consumerForm">
                <input type="hidden" name="action" id="formAction" value="add">
                <input type="hidden" name="id" id="consumerId">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
                <label for="address">Address</label>
                <input type="text" id="address" name="address" required>
                <label for="contact">Contact</label>
                <input type="text" id="contact" name="contact">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <label for="meter_no">Meter Number</label>
                <input type="text" id="meter_no" name="meter_no" readonly placeholder="Auto generated">
                <label for="category_id">Category</label>
                <select id="category_id" name="category_id" required>
                    <option value="">Loading categories...</option>
                </select>
                <button type="submit" id="submitBtn">Save Consumer</button>
                <button type="button" class="btn btn-danger" id="cancelBtn" style="width: 100%; margin-top: 10px;">Cancel</button>
            </form>
        </div>

        <div class="table-responsive">
            <table id="consumersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Contact</th>
                        <th>Meter No</th>
                        <th>Category</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Consumers will be loaded here via AJAX -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Mobile Navigation Toggle
            $('#navToggle').on('click', function() {
                $('#navMenu').toggleClass('active');
            });
        
            // Filter logic 
            function filterTable() {
                const searchValue = $('#searchInput').val().toLowerCase();
                const categoryValue = $('#categoryFilter').val().toLowerCase();
        
                $('#consumersTable tbody tr').filter(function () {
                    const rowText = $(this).text().toLowerCase();
                    const rowCategory = $(this).find('td:nth-child(5)').text().toLowerCase();
        
                    const matchesSearch = rowText.indexOf(searchValue) > -1;
                    const matchesCategory = categoryValue === "" || rowCategory === categoryValue;
        
                    $(this).toggle(matchesSearch && matchesCategory);
                });
            }
        
            $('#searchInput').on('keyup', filterTable);
            $('#categoryFilter').on('change', filterTable);
        
            // Load categories
            function loadCategories() {
                $.ajax({
                    url: '../../backend/php/categories.php?action=get_all',
                    type: 'GET',
                    dataType: 'json',
                    success: function(res) {
                        if (res.status === 'success') {
                            let formOptions = '<option value="">Select Category</option>';
                            let filterOptions = '<option value="">All Categories</option>';
        
                            res.data.forEach(cat => {
                                formOptions += `<option value="${cat.id}">${cat.name}</option>`;
                                filterOptions += `<option value="${cat.name}">${cat.name}</option>`;
                            });
        
                            $('#category_id').html(formOptions);
                            $('#categoryFilter').html(filterOptions);
                        }
                    }
                });
            }
        
            // Load consumers
            function loadConsumers() {
                $.ajax({
                    url: '../../backend/php/consumers.php?action=get_all',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            let rows = '';
                            if (response.data.length === 0) {
                                rows = '<tr><td colspan="6" style="text-align:center;">No consumers found.</td></tr>';
                            } else {
                                response.data.forEach(consumer => {
                                    rows += `
                                        <tr>
                                            <td>${consumer.name}</td>
                                            <td>${consumer.address}</td>
                                            <td>${consumer.contact || ''}</td>
                                            <td>${consumer.meter_no}</td>
                                            <td>${consumer.category_name}</td>
                                            <td>
                                                <button class="btn btn-primary editBtn" data-id="${consumer.id}">Edit</button>
                                                <button class="btn btn-danger deleteBtn" data-id="${consumer.id}">Delete</button>
                                            </td>
                                        </tr>
                                    `;
                                });
                            }
                            $('#consumersTable tbody').html(rows);
                        }
                    },
                    error: function(xhr) {
                        console.log(xhr.responseText);
                        $('#consumersTable tbody').html('<tr><td colspan="6" style="color:red;">Load failed</td></tr>');
                    }
                });
            }
        
            // ALL INITIALIZATION
            loadConsumers();
            initNotifications();
            loadCategories();
            
            // Add form
            $('#addConsumerBtn').on('click', function() {
                $('#formTitle').text('Add New Consumer');
                $('#formAction').val('add');
                $('#consumerForm')[0].reset();
                $('#consumerFormContainer').show();
            });
        
            // Cancel
            $('#cancelBtn').on('click', function() {
                $('#consumerFormContainer').hide();
            });
        
            // FIXED FORM SUBMIT (handles both ADD + EDIT)
            $('#consumerForm').on('submit', function(e) {
                e.preventDefault();

                $.post('../../backend/php/consumers.php', $(this).serialize(), function(res) {

                    if (res.status === 'success') {

                        alert(res.message);

                        // SHOW GENERATED METER NO
                        if(res.meter_no){
                            $('#meter_no').val(res.meter_no);
                        }

                        $('#consumerFormContainer').hide();
                        loadConsumers();
                    } else {
                        alert('Error: ' + res.message);
                    }

                }, 'json');
            });
        
            // FIXED EDIT BUTTON (event delegation)
            $(document).on('click', '.editBtn', function() {
                const id = $(this).data('id');
                console.log('Edit ID:', id);
                
                $.get('../../backend/php/consumers.php?action=get_by_id&id=' + id, function(res) {
                    if (res.status === 'success') {
                        populateForm(res.data);
                    } else {
                        alert('Load failed: ' + res.message);
                    }
                }, 'json');
            });
        
            // FIXED DELETE BUTTON (event delegation)
            let deleteId = null;

            // Open modal
            $(document).on('click', '.deleteBtn', function() {
                deleteId = $(this).data('id');
                $('#deletePassword').val(''); // clear old password
                $('#deleteModal').css('display', 'flex');
            });

            // Cancel button
            $('#cancelDelete').click(function() {
                $('#deleteModal').hide();
                deleteId = null;
            });
            

            // Confirm delete
            $('#confirmDelete').click(function() {
                const password = $('#deletePassword').val().trim();

                if (!password) {
                    alert('❌ Please enter password');
                    return;
                }

                if (!deleteId) {
                    alert('❌ Invalid consumer');
                    return;
                }

                $.post('../../backend/php/consumers.php', {
                    action: 'delete',
                    id: deleteId,
                    password: password
                }, function(res) {
                    if (res.status === 'success') {
                        alert('✅ Consumer deleted');
                        $('#deleteModal').hide();
                        deleteId = null;
                        loadConsumers();
                    } else {
                        alert('❌ ' + res.message);
                    }
                }, 'json').fail(function() {
                    alert('❌ Server error');
                });
            });

            $('#deleteModal').click(function(e) {
                if (e.target.id === 'deleteModal') {
                    $(this).hide();
                    deleteId = null;
                }
            });

        });
        
        // HELPER FUNCTIONS (must be global)
        function populateForm(data) {
            $('#consumerId').val(data.id);
            $('#name').val(data.name);
            $('#address').val(data.address);
            $('#contact').val(data.contact || '');
            $('#meter_no').val(data.meter_no);

            // ADD THIS
            $('#email').val(data.email || '');

            setTimeout(() => {
                $('#category_id').val(String(data.category_id));
            }, 200);

            $('#formAction').val('update');
            $('#formTitle').text('Edit: ' + data.name);
            $('#consumerFormContainer').show();

            $('html, body').animate({
                scrollTop: $('#consumerFormContainer').offset().top
            }, 500);
        }
        </script>
    
</body>
</html>
