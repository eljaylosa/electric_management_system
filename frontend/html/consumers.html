<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumers - Electric Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">Electric MS</div>
            <button class="nav-toggle" id="navToggle">&#9776;</button>
            <ul id="navMenu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="consumers.html">Consumers</a></li>
                <li><a href="billing.html">Billing</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="reports.html">Reports</a></li>
                <li><a href="../../backend/php/auth.php?action=logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Consumer Management</h1>
        <button class="btn btn-success" id="addConsumerBtn">Add New Consumer</button>

        <div class="filter-bar" style="margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="searchInput" placeholder="Search name / meter / address..." style="flex:1; padding:10px;">
        
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Residential">Residential</option>
                <option value="Commercial">Commercial</option>
            </select>
        </div>

        <div id="consumerFormContainer" style="display: none; margin-top: 20px;">
            <h2 id="formTitle">Add New Consumer</h2>
            <form id="consumerForm">
                <input type="hidden" name="action" id="formAction" value="add">
                <input type="hidden" name="id" id="consumerId">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
                <label for="address">Address</label>
                <input type="text" id="address" name="address" required>
                <label for="contact">Contact</label>
                <input type="text" id="contact" name="contact">
                <label for="meter_no">Meter Number</label>
                <input type="text" id="meter_no" name="meter_no" required>
                <label for="category_id">Category</label>
                <select id="category_id" name="category_id" required>
                    <option value="1">Residential</option>
                    <option value="2">Commercial</option>
                </select>
                <button type="submit" id="submitBtn">Save Consumer</button>
                <button type="button" class="btn btn-danger" id="cancelBtn" style="width: 100%; margin-top: 10px;">Cancel</button>
            </form>
        </div>

        <div class="table-responsive">
            <table id="consumersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Contact</th>
                        <th>Meter No</th>
                        <th>Category</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Consumers will be loaded here via AJAX -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Mobile Navigation Toggle
            $('#navToggle').on('click', function() {
                $('#navMenu').toggleClass('active');
            });

            // filter logic 
            function filterTable() {
                const searchValue = $('#searchInput').val().toLowerCase();
                const categoryValue = $('#categoryFilter').val().toLowerCase();

                $('#consumersTable tbody tr').filter(function () {
                    const rowText = $(this).text().toLowerCase();
                    const rowCategory = $(this).find('td:nth-child(5)').text().toLowerCase();

                    const matchesSearch = rowText.indexOf(searchValue) > -1;
                    const matchesCategory = categoryValue === "" || rowCategory === categoryValue;

                    $(this).toggle(matchesSearch && matchesCategory);
                });
            }

            // events
            $('#searchInput').on('keyup', filterTable);
            $('#categoryFilter').on('change', filterTable);

            // Load all consumers
            function loadConsumers() {
                $.ajax({
                    url: '../../backend/php/consumers.php?action=get_all',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            let rows = '';
                            
                            if (response.data.length === 0) {
                                rows = '<tr><td colspan="6" style="text-align:center;">No consumers found.</td></tr>';
                            } else {
                                response.data.forEach(consumer => {
                                    rows += `
                                        <tr>
                                            <td data-label="Name">${consumer.name}</td>
                                            <td data-label="Address">${consumer.address}</td>
                                            <td data-label="Contact">${consumer.contact}</td>
                                            <td data-label="Meter No">${consumer.meter_no}</td>
                                            <td data-label="Category">${consumer.category_name}</td>
                                            <td data-label="Actions">
                                                <button class="btn btn-primary editBtn" data-id="${consumer.id}">Edit</button>
                                                <button class="btn btn-danger deleteBtn" data-id="${consumer.id}">Delete</button>
                                            </td>
                                        </tr>
                                    `;
                                });
                            }
                            $('#consumersTable tbody').html(rows);
                            $('#searchInput').val('');
                            $('#categoryFilter').val('');
                        } else {
                            alert('Error: ' + response.message);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('AJAX Error: ' + status + ' - ' + error);
                        $('#consumersTable tbody').html('<tr><td colspan="6" style="text-align:center; color:red;">Failed to load data. Check console for details.</td></tr>');
                    }
                });
            }

            loadConsumers();

            // Show add form
            $('#addConsumerBtn').on('click', function() {
                $('#formTitle').text('Add New Consumer');
                $('#formAction').val('add');
                $('#consumerForm')[0].reset();
                $('#consumerFormContainer').show();
                $('html, body').animate({ scrollTop: $("#consumerFormContainer").offset().top }, 500);
            });

            // Cancel form
            $('#cancelBtn').on('click', function() {
                $('#consumerFormContainer').hide();
            });

            // Submit form (Add/Update)
            $('#consumerForm').on('submit', function(e) {
                e.preventDefault();
                $.ajax({
                    url: '../../backend/php/consumers.php',
                    type: 'POST',
                    data: $(this).serialize(),
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            alert(response.message);
                            $('#consumerFormContainer').hide();
                            loadConsumers();
                        } else {
                            alert(response.message);
                        }
                    }
                });
            });

            // Edit consumer
            $(document).on('click', '.editBtn', function() {
                const id = $(this).data('id');
                $.ajax({
                    url: `../../backend/php/consumers.php?action=get_by_id&id=${id}`,
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            const consumer = response.data;
                            $('#formTitle').text('Edit Consumer');
                            $('#formAction').val('update');
                            $('#consumerId').val(consumer.id);
                            $('#name').val(consumer.name);
                            $('#address').val(consumer.address);
                            $('#contact').val(consumer.contact);
                            $('#meter_no').val(consumer.meter_no);
                            $('#category_id').val(consumer.category_id);
                            $('#consumerFormContainer').show();
                            $('html, body').animate({ scrollTop: $("#consumerFormContainer").offset().top }, 500);
                        }
                    }
                });
            });

            // Delete consumer
            $(document).on('click', '.deleteBtn', function() {
                if (confirm('Are you sure you want to delete this consumer?')) {
                    const id = $(this).data('id');
                    $.ajax({
                        url: '../../backend/php/consumers.php',
                        type: 'POST',
                        data: { action: 'delete', id: id },
                        dataType: 'json',
                        success: function(response) {
                            if (response.status === 'success') {
                                alert(response.message);
                                loadConsumers();
                            } else {
                                alert(response.message);
                            }
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
